# Gas Killer Load Test — testnet.gaskiller.xyz
#
# Run with:
#   cargo run -p scripts --bin run_scenario -- scripts/scenarios/testnet_load.toml
#
# Requires:
#   HTTP_RPC          — HTTP RPC endpoint
#   GAS_KILLER_API_KEY  — API key sent as `Authorization: Bearer <key>` on /trigger (if the server requires auth)
#
# Structure:
#   1. smoke   — single serial request with on-chain verification; confirms the
#                stack is healthy before applying load
#   2. burst_10 — 10 concurrent requests to a separate duplicate contract;
#                verify = false so results return immediately without waiting
#                for on-chain confirmation.

router_url           = "https://testnet.gaskiller.xyz"
http_rpc             = "$HTTP_RPC"
api_key              = "$GAS_KILLER_API_KEY"   # /trigger auth: set $GAS_KILLER_API_KEY in env, or paste a literal gk_ key
ingress_timeout_secs = 60

# ── Burst test with 10 concurrent requests ──────────────────────────────────
[[scenarios]]
name  = "burst_10"
mode  = "parallel"

  [[scenarios.requests]]
  label            = "burst_1"
  target_address   = "kubectl"
  call_data        = ""
  from_address     = "0xff467a85932cF543Df50255f00A8A829c12a3A11"
  transition_index = "auto"
  value            = "0"
  block_height     = 0
  verify           = false

