# Gas Killer Scenario Config
#
# Run with:
#   cargo run -p scripts --bin run_scenario -- scripts/run_scenario_example.toml

router_url = "http://localhost:8080"
http_rpc   = "http://localhost:8545"   # required when any request has block_height = 0

# ── Scenario 1: serial smoke test ────────────────────────────────────────────
[[scenarios]]
name = "smoke"
mode = "serial"
delay_between_ms = 500   # wait 500ms between requests

  [[scenarios.requests]]
  label          = "valid_tx"
  target_address = "0xCONTRACT_ADDRESS_HERE"
  call_data      = "0xabcdef01"       # ABI-encoded calldata (function selector + params)
  from_address   = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  transition_index = 0
  value          = "0"
  block_height   = 0                  # 0 = auto-fetch current block

  [[scenarios.requests]]
  label          = "zero_target"      # expected to be rejected
  target_address = "0x0000000000000000000000000000000000000000"
  call_data      = "0xabcdef01"
  from_address   = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  transition_index = 0
  value          = "0"
  block_height   = 0

# ── Scenario 2: parallel stress test ─────────────────────────────────────────
[[scenarios]]
name  = "stress"
mode  = "parallel"

  [[scenarios.requests]]
  label          = "stress_1"
  target_address = "0xCONTRACT_ADDRESS_HERE"
  call_data      = "0xabcdef01"
  from_address   = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  transition_index = 1
  value          = "0"
  block_height   = 0

  [[scenarios.requests]]
  label          = "stress_2"
  target_address = "0xCONTRACT_ADDRESS_HERE"
  call_data      = "0xabcdef01"
  from_address   = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  transition_index = 2
  value          = "0"
  block_height   = 0

  [[scenarios.requests]]
  label          = "stress_3"
  target_address = "0xCONTRACT_ADDRESS_HERE"
  call_data      = "0xabcdef01"
  from_address   = "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  transition_index = 3
  value          = "0"
  block_height   = 0
