# Stable testnet configuration. Pass on every testnet upgrade.
#
# Usage:
#   helm upgrade --install gas-killer ./helm/gas-killer \
#     -f helm/gas-killer/testnet-overrides.yaml \
#     --set secrets.privateKey=0x... \
#     --set secrets.fundedKey=0x... \
#     --set secrets.httpRpc=https://... \
#     --set secrets.l2HttpRpc=https://... \
#     --set secrets.ingressPassword=password \
#     --set l2.enabled=true \
#     --set router.image.tag=router-<sha> \
#     --set node.image.tag=node-<sha> \
#     --set kube-prometheus-stack.grafana.adminPassword=<password>

global:
  environment: TESTNET

eigenlayer:
  contracts:
    delegationManager: "0xD4A7E1Bd8015057293f0D0A557088c286942e84b"
    strategyManager: "0x2E3D6c0744b10eb0A4e6F679F71554a39Ec47a5D"
    lstContract: "0x00c71b0fcadE911B2feeE9912De4Fe19eB04ca56"
    lstStrategy: "0x8b29d91e67b013e855EaFe0ad704aC4Ab086a574"
    allocationManager: "0x42583067658071247ec8CE0A516A58f682002d07"

imagePullSecrets:
  - name: ghcr-pull-secret

ingress:
  enabled: true
  host: testnet.gaskiller.xyz

monitoring:
  enabled: true
  grafana:
    ingress:
      enabled: true
      host: grafana-testnet.gaskiller.xyz

router:
  ingress:
    timeoutMs: "0"