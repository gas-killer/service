{{- /* Setup job runs in both LOCAL and TESTNET modes */ -}}
{{- $runSetup := or (and .Values.secrets.forkUrl (eq .Values.global.environment "LOCAL")) (and .Values.secrets.httpRpc (eq .Values.global.environment "TESTNET")) -}}
{{- if and $runSetup (or .Release.IsInstall .Values.rerun.setup) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gas-killer.setup.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup
  annotations:
    # Runs automatically on helm install. On helm upgrade, only fires when rerun.setup=true.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      restartPolicy: OnFailure
      {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
      serviceAccountName: {{ default (include "gas-killer.serviceaccount.fullname" .) .Values.secretManager.serviceAccountName }}
      {{- end }}
      {{- $needsInitContainers := or (eq .Values.global.environment "LOCAL") (and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled) }}
      {{- if $needsInitContainers }}
      initContainers:
        {{- if eq .Values.global.environment "LOCAL" }}
        # Wait for L1 to be ready (LOCAL mode only)
        - name: wait-for-l1
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for L1 RPC (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until nc -z {{ include "gas-killer.l1.fullname" . }} {{ .Values.l1.service.port }}; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for L1 RPC after ${TIMEOUT}s"
                  exit 1
                fi
                echo "L1 not ready, waiting... (${ELAPSED}s elapsed)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "L1 is ready!"
        {{- end }}
        {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
        # Restore avs_deploy.json and BLS keys from Secret Manager if the PVC is empty
        # (e.g. after cluster recreation). If secrets don't exist yet this is a fresh
        # install — exit 0 and let eigenlayer-setup run normally.
        - name: fetch-avs-deploy
          image: {{ .Values.secretManager.cloudSdkImage | quote }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail

              PROJECT="{{ required "secretManager.projectId is required when secretManager.enabled=true" .Values.secretManager.projectId }}"
              PREFIX="{{ .Values.secretManager.keyPrefix }}"
              DEPLOY_SECRET="${PREFIX}-avs-deploy"

              echo "Checking Secret Manager for existing deployment state (secret: ${DEPLOY_SECRET})..."

              # No avs_deploy secret yet → fresh install, let eigenlayer-setup run normally.
              # Capture stderr so we can distinguish NOT_FOUND from auth/permission failures.
              if ! describe_error="$(gcloud secrets describe "${DEPLOY_SECRET}" --project="${PROJECT}" 2>&1 >/dev/null)"; then
                if printf '%s\n' "${describe_error}" | grep -Eqi '(^|[[:space:][:punct:]])NOT_FOUND([[:space:][:punct:]]|$)|not found'; then
                  echo "Secret ${DEPLOY_SECRET} not found. Proceeding with fresh setup."
                  exit 0
                fi
                echo "Failed to check Secret Manager for ${DEPLOY_SECRET}: ${describe_error}" >&2
                exit 1
              fi

              # PVC already has a completed setup (normal helm upgrade) → nothing to restore.
              if [ -f /root/.nodes/.setup_complete ]; then
                echo "PVC already has .setup_complete marker. Skipping restore."
                exit 0
              fi

              # If setup files already exist without the completion marker, do not overwrite them.
              # This guards against a partial prior run (e.g. crash after avs_deploy.json was
              # written but before .setup_complete was created).
              if [ -f /root/.nodes/avs_deploy.json ] || find /root/.nodes/operator_keys -maxdepth 1 -type f -name '*.json' 2>/dev/null | grep -q .; then
                echo "Detected existing setup files in PVC without .setup_complete marker. Refusing to restore over partial state." >&2
                exit 1
              fi
              echo "Secret found and no existing restore target files were detected. Restoring state from Secret Manager..."
              mkdir -p /root/.nodes/operator_keys

              # Restore avs_deploy.json
              gcloud secrets versions access latest \
                --secret="${DEPLOY_SECRET}" \
                --project="${PROJECT}" \
                > /root/.nodes/avs_deploy.json
              echo "Restored avs_deploy.json"

              # Restore each operator's BLS key — fails fast if any secret is missing.
              {{- $nodeCount := int .Values.global.nodeCount }}
              {{- range $i := until $nodeCount }}
              {{- $nodeIndex := add $i 1 }}
              gcloud secrets versions access latest \
                --secret="${PREFIX}-node-{{ $nodeIndex }}-bls-key" \
                --project="${PROJECT}" \
                > /root/.nodes/operator_keys/testacc{{ $nodeIndex }}.private.bls.key.json
              echo "Restored testacc{{ $nodeIndex }} BLS key"
              {{- end }}

              # Fix permissions so non-root containers can read the files
              chmod -R 755 /root/.nodes
              chmod 644 /root/.nodes/avs_deploy.json
              chmod 644 /root/.nodes/operator_keys/*.json

              # Signal eigenlayer-setup to skip re-running
              touch /root/.nodes/.setup_complete
              chmod 644 /root/.nodes/.setup_complete

              echo "State restored from Secret Manager. Setup will be skipped."
          volumeMounts:
            - name: shared-data
              mountPath: /root/.nodes
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        {{- end }}
      {{- end }}

      containers:
        # Run EigenLayer setup (creates operator keys and avs_deploy.json)
        - name: eigenlayer-setup
          image: "{{ .Values.eigenlayer.image.repository }}:{{ .Values.eigenlayer.image.tag }}"
          imagePullPolicy: {{ .Values.eigenlayer.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set +e
              # Write all logs to both stdout AND a file on the PVC
              # This ensures logs survive even if the pod crashes
              LOG_FILE="/root/.nodes/setup.log"

              {
                echo "=== Setup Job Starting at $(date -Iseconds) ==="
                echo "Logs being written to: $LOG_FILE"
                echo ""

                # Skip re-running setup on helm upgrade if setup already completed.
                # Re-running would re-deploy contracts + re-generate operator keys, which would
                # diverge from on-chain state and (in TESTNET+secretManager mode) from Secret Manager.
                if [ -f /root/.nodes/.setup_complete ]; then
                  echo "Setup already completed (.setup_complete marker found). Skipping re-run."
                  echo "=== Setup Job SKIPPED (already complete) at $(date -Iseconds) ==="
                  exit 0
                fi

                echo "=== Setup Job Starting ==="
                echo "ENVIRONMENT: $ENVIRONMENT"
                echo "TEST_ACCOUNTS: $TEST_ACCOUNTS"
                echo "HTTP_RPC: ${HTTP_RPC:0:50}..."
                echo "DELEGATION_MANAGER_ADDRESS: $DELEGATION_MANAGER_ADDRESS"
                echo "STRATEGY_MANAGER_ADDRESS: $STRATEGY_MANAGER_ADDRESS"
                echo "ALLOCATION_MANAGER_ADDRESS: $ALLOCATION_MANAGER_ADDRESS"
                echo ""
                echo "=== Running /main.sh ==="

                # main.sh reads RPC_URL; re-export from HTTP_RPC
                export RPC_URL="$HTTP_RPC"

                # Run the eigenlayer setup and capture output
                /main.sh 2>&1
                MAIN_EXIT_CODE=$?

                echo ""
                echo "=== /main.sh completed with exit code: $MAIN_EXIT_CODE ==="
                echo ""
                echo "=== Checking created files ==="
                echo "Contents of /root/.nodes:"
                ls -la /root/.nodes/ 2>/dev/null || echo "Directory does not exist or is empty"
                echo ""
                echo "Contents of /root/.nodes/operator_keys:"
                ls -la /root/.nodes/operator_keys/ 2>/dev/null || echo "Directory does not exist or is empty"
                echo ""

                # Fail immediately if main.sh exited non-zero — file existence alone is not
                # sufficient proof of success (files may be left over from a prior run).
                if [ $MAIN_EXIT_CODE -ne 0 ]; then
                  echo "Error: /main.sh failed with exit code $MAIN_EXIT_CODE"
                  echo "=== Setup Job FAILED at $(date -Iseconds) ==="
                  exit 1
                fi

                # Verify that required files were created
                if [ -f /root/.nodes/avs_deploy.json ]; then
                  echo "avs_deploy.json created successfully"
                  # Check if all operator keys exist
                  {{- $nodeCount := int .Values.global.nodeCount }}
                  {{- range $i := until $nodeCount }}
                  {{- $nodeIndex := add $i 1 }}
                  if [ ! -f "/root/.nodes/operator_keys/testacc{{ $nodeIndex }}.private.bls.key.json" ]; then
                    echo "Error: testacc{{ $nodeIndex }}.private.bls.key.json not found"
                    exit 1
                  fi
                  {{- end }}
                  echo "All {{ .Values.global.nodeCount }} operator keys created successfully"

                  # Fix permissions so non-root containers can read the files
                  # Node/router containers run as UID 1000 (appuser)
                  chmod -R 755 /root/.nodes
                  chmod 644 /root/.nodes/avs_deploy.json
                  chmod 644 /root/.nodes/operator_keys/*.json
                  echo "Permissions fixed for UID 1000"

                  # Create marker file to signal setup completion
                  touch /root/.nodes/.setup_complete
                  chmod 644 /root/.nodes/.setup_complete
                  echo "Setup marker created"
                  echo "=== Setup Job SUCCEEDED at $(date -Iseconds) ==="
                  exit 0
                else
                  echo "Error: avs_deploy.json not found"
                  echo "=== Setup Job FAILED at $(date -Iseconds) ==="
                  exit 1
                fi
              } 2>&1 | tee -a "$LOG_FILE"

              EXIT_CODE=${PIPESTATUS[0]}
              exit $EXIT_CODE
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            {{- if eq .Values.global.environment "TESTNET" }}
            # TESTNET mode: Use external RPC from secret
            - name: HTTP_RPC
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: HTTP_RPC
            {{- else }}
            # LOCAL mode: Use local L1 Anvil service
            - name: HTTP_RPC
              value: "http://{{ include "gas-killer.l1.fullname" . }}:{{ .Values.l1.service.port }}"
            {{- end }}
            - name: TEST_ACCOUNTS
              value: {{ .Values.global.nodeCount | quote }}
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: PRIVATE_KEY
            - name: FUNDED_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: FUNDED_KEY
            - name: DELEGATION_MANAGER_ADDRESS
              value: {{ required "eigenlayer.contracts.delegationManager must be set (use an overrides file matching your target network)" .Values.eigenlayer.contracts.delegationManager | quote }}
            - name: STRATEGY_MANAGER_ADDRESS
              value: {{ required "eigenlayer.contracts.strategyManager must be set (use an overrides file matching your target network)" .Values.eigenlayer.contracts.strategyManager | quote }}
            - name: LST_CONTRACT_ADDRESS
              value: {{ required "eigenlayer.contracts.lstContract must be set (use an overrides file matching your target network)" .Values.eigenlayer.contracts.lstContract | quote }}
            - name: LST_STRATEGY_ADDRESS
              value: {{ required "eigenlayer.contracts.lstStrategy must be set (use an overrides file matching your target network)" .Values.eigenlayer.contracts.lstStrategy | quote }}
            - name: ALLOCATION_MANAGER_ADDRESS
              value: {{ required "eigenlayer.contracts.allocationManager must be set (use an overrides file matching your target network)" .Values.eigenlayer.contracts.allocationManager | quote }}
          volumeMounts:
            - name: shared-data
              mountPath: /root/.nodes
            - name: config
              mountPath: /bls-middleware/contracts/docker/eigenlayer/config.json
              subPath: config.json
              readOnly: true
          resources:
            {{- toYaml .Values.eigenlayer.resources | nindent 12 }}

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" . }}
        - name: config
          configMap:
            name: {{ include "gas-killer.config.fullname" . }}
{{- end }}
