apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gas-killer.router.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gas-killer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: router
    spec:
      terminationGracePeriodSeconds: {{ .Values.router.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.secretManager.enabled }}
      serviceAccountName: {{ default (include "gas-killer.serviceaccount.fullname" .) .Values.secretManager.serviceAccountName }}
      {{- end }}
      initContainers:
        {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
        # Fetch avs_deploy.json and the router private key from GCP Secret Manager.
        # Workload Identity provides authentication — no static credentials needed.
        # Retries until the key-export job has run and the secrets exist.
        - name: fetch-secrets
          image: {{ .Values.secretManager.cloudSdkImage | quote }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              PROJECT="{{ required "secretManager.projectId is required when secretManager.enabled=true" .Values.secretManager.projectId }}"
              PREFIX="{{ .Values.secretManager.keyPrefix }}"
              TIMEOUT={{ .Values.global.initTimeout }}

              fetch_secret() {
                local name="$1" dest="$2"
                local elapsed=0
                echo "Fetching ${name} (timeout: ${TIMEOUT}s)..."
                until gcloud secrets versions access latest \
                  --secret="$name" --project="$PROJECT" > "$dest" 2>/dev/null; do
                  if [ "$elapsed" -ge "$TIMEOUT" ]; then
                    echo "ERROR: Timeout waiting for ${name} after ${TIMEOUT}s"
                    exit 1
                  fi
                  echo "Secret ${name} not available yet, retrying... (${elapsed}s elapsed)"
                  sleep 10
                  elapsed=$((elapsed + 10))
                done
                echo "Fetched ${name}"
              }

              fetch_secret "${PREFIX}-avs-deploy"       /app/secrets/avs_deploy.json
              fetch_secret "${PREFIX}-router-private-key" /app/secrets/router_orchestrator.json
              chmod 644 /app/secrets/router_orchestrator.json
              echo "All router secrets fetched successfully"
          volumeMounts:
            - name: router-secrets
              mountPath: /app/secrets
        {{- else }}
        # Wait for setup job to fully complete (check for .setup_complete marker)
        - name: wait-for-setup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for setup to complete (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.setup_complete ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for setup to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Setup not complete, waiting for .setup_complete marker... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Setup complete! Contracts deployed and operators registered."
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
        {{- end }}

        {{- if .Values.bridge.waitForBridge }}
        # Wait for bridge job to complete before starting the router
        # The bridge creates a .bridge_complete marker when done
        - name: wait-for-bridge
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for bridge to complete (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.bridge_complete ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for bridge to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Bridge not complete, waiting for .bridge_complete marker... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Bridge complete!"
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
        {{- end }}

        {{- if eq .Values.global.environment "LOCAL" }}
        # Wait for L1 RPC to be accessible (LOCAL mode only)
        - name: wait-for-l1
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for L1 RPC (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until nc -z {{ include "gas-killer.l1.fullname" . }} {{ .Values.l1.service.port }}; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for L1 RPC after ${TIMEOUT}s"
                  exit 1
                fi
                echo "L1 not ready, waiting... (${ELAPSED}s elapsed)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "L1 is ready!"
        {{- end }}

        # Wait for nodes to be ready
        - name: wait-for-nodes
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for nodes to be ready (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              {{- $nodeCount := int .Values.global.nodeCount }}
              {{- range $i := until $nodeCount }}
              {{- $nodeIndex := add $i 1 }}
              {{- $nodePort := add (int $.Values.node.basePort) $i }}
              until nc -z {{ include "gas-killer.node.fullname" $ }}-{{ $nodeIndex }} {{ $nodePort }}; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for Node {{ $nodeIndex }} after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Node {{ $nodeIndex }} not ready, waiting... (${ELAPSED}s elapsed)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "Node {{ $nodeIndex }} is ready!"
              {{- end }}
              echo "All nodes are ready!"

        {{- if and .Values.orchestrator.routerPrivateKey (not (and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled)) }}
        # Create router_orchestrator.json from an explicitly-provided secret.
        # Skipped when secretManager is enabled — the key is fetched from GCP instead.
        - name: setup-router-key
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo '{"privateKey":"'$ROUTER_KEY'"}' > /app/router_orchestrator.json
              echo "Router orchestrator key file created from secret"
          env:
            - name: ROUTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: ROUTER_ORCHESTRATOR_PRIVATE_KEY
          volumeMounts:
            - name: router-key
              mountPath: /app
        {{- end }}

      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}:{{ required "router.image.tag must be set" .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          args:
            - "--key-file"
            {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
            # Fetched from GCP Secret Manager by the fetch-secrets init container
            - "/app/secrets/router_orchestrator.json"
            {{- else if .Values.orchestrator.routerPrivateKey }}
            # Written by the setup-router-key init container from an explicit secret
            - "/app/router_orchestrator.json"
            {{- else if eq .Values.global.environment "TESTNET" }}
            {{- fail "TESTNET deployments require either secretManager.enabled=true or orchestrator.routerPrivateKey. Using the dev keypair in production is not allowed." }}
            {{- else }}
            # Development default bundled in the image — LOCAL only
            - "/app/config/router_orchestrator.dev.json"
            {{- end }}
            - "--port"
            - {{ .Values.router.port | quote }}
          env:
            {{- if eq .Values.global.environment "TESTNET" }}
            # TESTNET mode (no L2): Use external RPC from secret
            - name: HTTP_RPC
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: HTTP_RPC
            - name: WS_RPC
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: WS_RPC
            {{- if .Values.secrets.forkUrl }}
            # FORK_URL for internal Anvil simulation
            - name: FORK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: FORK_URL
            {{- end }}
            {{- else }}
            # LOCAL mode: Use local L1 Anvil service
            - name: HTTP_RPC
              value: "http://{{ include "gas-killer.l1.fullname" . }}:{{ .Values.l1.service.port }}"
            - name: WS_RPC
              value: "ws://{{ include "gas-killer.l1.fullname" . }}:{{ .Values.l1.service.port }}"
            {{- end }}
            {{- if .Values.l2.enabled }}
            {{- if eq .Values.global.environment "LOCAL" }}
            - name: L2_HTTP_RPC
              value: "http://{{ include "gas-killer.l2.fullname" . }}:{{ .Values.l2.service.port }}"
            {{- else if eq .Values.global.environment "TESTNET" }}
            - name: L2_HTTP_RPC
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: L2_HTTP_RPC
            {{- end }}
            {{- end }}
            - name: AVS_DEPLOYMENT_PATH
              {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
              value: "/app/secrets/avs_deploy.json"
              {{- else }}
              value: "/app/.nodes/avs_deploy.json"
              {{- end }}
            - name: INGRESS
              value: {{ .Values.router.ingress.enabled | quote }}
            - name: INGRESS_ADDRESS
              value: "{{ .Values.router.ingressBindHost }}:{{ .Values.router.ingressPort }}"
            - name: RUST_BACKTRACE
              value: "1"
            - name: INGRESS_TIMEOUT_MS
              value: {{ .Values.router.ingress.timeoutMs | quote }}
            {{- if or (and (eq .Values.global.environment "TESTNET") .Values.router.ingress.enabled) .Values.secrets.ingressPassword }}
            - name: INGRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: INGRESS_PASSWORD
            {{- end }}
            - name: AVS_METADATA_NAME
              value: {{ .Values.router.avsMetadata.name | quote }}
            - name: AVS_METADATA_WEBSITE
              value: {{ .Values.router.avsMetadata.website | quote }}
            - name: AVS_METADATA_DESCRIPTION
              value: {{ .Values.router.avsMetadata.description | quote }}
            {{- if .Values.router.avsMetadata.logo }}
            - name: AVS_METADATA_LOGO
              value: {{ .Values.router.avsMetadata.logo | quote }}
            {{- end }}
            {{- if .Values.router.avsMetadata.twitter }}
            - name: AVS_METADATA_TWITTER
              value: {{ .Values.router.avsMetadata.twitter | quote }}
            {{- end }}
            {{- if .Values.router.avsMetadata.operatorSet.name }}
            - name: AVS_OPSET_NAME
              value: {{ .Values.router.avsMetadata.operatorSet.name | quote }}
            - name: AVS_OPSET_ID
              value: {{ .Values.router.avsMetadata.operatorSet.id | quote }}
            - name: AVS_OPSET_DESCRIPTION
              value: {{ .Values.router.avsMetadata.operatorSet.description | quote }}
            - name: AVS_OPSET_SOFTWARE_NAME
              value: {{ .Values.router.avsMetadata.operatorSet.softwareName | quote }}
            - name: AVS_OPSET_SOFTWARE_DESCRIPTION
              value: {{ .Values.router.avsMetadata.operatorSet.softwareDescription | quote }}
            - name: AVS_OPSET_SOFTWARE_URL
              value: {{ .Values.router.avsMetadata.operatorSet.softwareUrl | quote }}
            - name: AVS_OPSET_SLASHING_CONDITIONS
              value: {{ .Values.router.avsMetadata.operatorSet.slashingConditions | quote }}
            {{- end }}
            - name: AGGREGATION_TIMEOUT
              value: {{ .Values.router.aggregationTimeout | quote }}
            {{- if .Values.router.receiptTimeoutSecs }}
            - name: EXECUTOR_RECEIPT_TIMEOUT_SECS
              value: {{ .Values.router.receiptTimeoutSecs | quote }}
            {{- end }}
            - name: HEALTHZ_PORT
              value: {{ .Values.router.healthzPort | quote }}
            - name: P2P_MESSAGE_BACKLOG
              value: {{ .Values.router.p2pMessageBacklog | quote }}
            - name: P2P_MESSAGES_PER_SECOND
              value: {{ .Values.router.p2pMessagesPerSecond | quote }}
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: PRIVATE_KEY
          ports:
            - name: router
              containerPort: {{ .Values.router.port }}
              protocol: TCP
            - name: ingress
              containerPort: {{ .Values.router.ingressPort }}
              protocol: TCP
            - name: healthz
              containerPort: {{ .Values.router.healthzPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
            {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
            - name: router-secrets
              mountPath: /app/secrets
              readOnly: true
            {{- end }}
            {{- if and .Values.orchestrator.routerPrivateKey (not (and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled)) }}
            - name: router-key
              mountPath: /app/router_orchestrator.json
              subPath: router_orchestrator.json
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" . }}
        {{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled }}
        - name: router-secrets
          emptyDir: {}
        {{- end }}
        {{- if and .Values.orchestrator.routerPrivateKey (not (and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled)) }}
        - name: router-key
          emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gas-killer.router.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - port: {{ .Values.router.service.port }}
      targetPort: router
      protocol: TCP
      name: router
    - port: {{ .Values.router.service.ingressPort }}
      targetPort: ingress
      protocol: TCP
      name: ingress
    - port: {{ .Values.router.healthzPort }}
      targetPort: healthz
      protocol: TCP
      name: metrics
  selector:
    {{- include "gas-killer.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: router
