{{- if .Values.ingress.enabled }}
{{- if not .Values.ingress.host }}
{{- fail "ingress.host is required when ingress.enabled is true" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gas-killer.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- /*
            Explicit allowlist of public paths. Any path not listed (notably /admin/*) is not
            routed here and stays reachable only in-cluster. Falls back to the router's public
            routes if publicPaths is unset, never to a catch-all "/".
          */}}
          {{- range .Values.ingress.publicPaths | default (list "/trigger" "/avs-metadata" "/healthz") }}
          - path: {{ . | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "gas-killer.router.fullname" $ }}
                port:
                  name: ingress
          {{- end }}
{{- end }}
