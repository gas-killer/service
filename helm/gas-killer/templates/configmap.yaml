apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gas-killer.config.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
data:
  # EigenLayer setup config - dynamically generates operator socket addresses
  # This replaces config/config.example.json with Kubernetes service names
  config.json: |
    {
        "quorum": {
            "minimumStake": {{ .Values.eigenlayer.quorum.minimumStake | quote }},
            "maxOperatorCount": {{ .Values.eigenlayer.quorum.maxOperatorCount }},
            "kickBIPsOfOperatorStake": {{ .Values.eigenlayer.quorum.kickBIPsOfOperatorStake }},
            "kickBIPsOfTotalStake": {{ .Values.eigenlayer.quorum.kickBIPsOfTotalStake }}
        },
        "metadata": {
            "uri": "{{ if .Values.ingress.host }}https://{{ .Values.ingress.host }}/avs-metadata{{ else }}metadataURI{{ end }}"
        },
        "operators": {
            {{- $nodeCount := int .Values.global.nodeCount }}
            {{- range $i := until $nodeCount }}
            "testacc{{ add $i 1 }}": {
                "socketAddress": "{{ include "gas-killer.node.fullname" $ }}-{{ add $i 1 }}:{{ add (int $.Values.node.basePort) $i }}"
            }{{ if lt (add $i 1) $nodeCount }},{{ end }}
            {{- end }}
        }
    }
  {{- if and .Values.orchestrator.publicConfig (not (and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled)) }}
  # Public orchestrator config for LOCAL mode or TESTNET without secretManager.
  # Omitted when secretManager is enabled — nodes fetch the router public key from GCP instead.
  public_orchestrator.json: |
    {
      "g2_x1": {{ .Values.orchestrator.publicConfig.g2_x1 | quote }},
      "g2_x2": {{ .Values.orchestrator.publicConfig.g2_x2 | quote }},
      "g2_y1": {{ .Values.orchestrator.publicConfig.g2_y1 | quote }},
      "g2_y2": {{ .Values.orchestrator.publicConfig.g2_y2 | quote }},
      "port": {{ .Values.orchestrator.publicConfig.port | quote }},
      "address": {{ include "gas-killer.router.fullname" . | quote }}
    }
  {{- end }}
