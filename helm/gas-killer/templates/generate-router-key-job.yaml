{{- if and (eq .Values.global.environment "TESTNET") .Values.secretManager.enabled (or .Release.IsInstall .Values.rerun.generateRouterKey) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gas-killer.generate-router-key.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: generate-router-key
  annotations:
    # Preserve the job after completion so its logs remain inspectable.
    "helm.sh/resource-policy": keep
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: generate-router-key
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ default (include "gas-killer.serviceaccount.fullname" .) .Values.secretManager.serviceAccountName }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.rerun.generateRouterKey }}
      # On a fresh PVC (e.g. after cluster recreation), check if a keypair already exists in
      # GCP Secret Manager. If so, restore it so generate_key skips generation and the
      # registered on-chain public key is preserved. Skipped during intentional key rotation
      # (rerun.generateRouterKey=true) where a fresh keypair is explicitly desired.
      initContainers:
        - name: restore-from-gcp
          image: {{ .Values.secretManager.cloudSdkImage | quote }}
          securityContext:
            runAsUser: 0
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              PROJECT="{{ required "secretManager.projectId is required when secretManager.enabled=true" .Values.secretManager.projectId }}"
              PREFIX="{{ .Values.secretManager.keyPrefix }}"
              MARKER=/root/.nodes/.router_key_complete

              # Capture stderr; discard stdout. Exit code 0 = secret exists.
              if DESCRIBE_ERR=$(gcloud secrets describe "${PREFIX}-router-private-key" \
                  --project="$PROJECT" 2>&1 1>/dev/null); then
                echo "Found existing router keypair in GCP Secret Manager — restoring to PVC"

                gcloud secrets versions access latest \
                  --secret="${PREFIX}-router-private-key" \
                  --project="$PROJECT" > /root/.nodes/router_orchestrator.json

                gcloud secrets versions access latest \
                  --secret="${PREFIX}-router-public-key" \
                  --project="$PROJECT" > /root/.nodes/public_orchestrator.json

                chmod 644 /root/.nodes/router_orchestrator.json
                chmod 644 /root/.nodes/public_orchestrator.json
                touch "$MARKER"
                echo "Restored router keypair from GCP Secret Manager"
              elif echo "$DESCRIBE_ERR" | grep -q "NOT_FOUND"; then
                echo "No existing router keypair in GCP — generate_key will create a fresh one"
              else
                echo "ERROR: Unexpected error checking GCP Secret Manager: $DESCRIBE_ERR" >&2
                exit 1
              fi
          volumeMounts:
            - name: shared-data
              mountPath: /root/.nodes
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        {{- end }}
      containers:
        - name: generate-key
          image: "{{ .Values.router.image.repository }}:{{ required "router.image.tag must be set" .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          # Run as root so we can write to the shared PVC (files are created by
          # the setup job as root; the directory is 755 / owned by root).
          securityContext:
            runAsUser: 0
          command:
            - generate_key
          args:
            - --output-dir
            - /root/.nodes
            - --router-address
            - {{ include "gas-killer.router.fullname" . }}
            - --router-port
            - {{ .Values.router.port | quote }}
            {{- if .Values.rerun.generateRouterKey }}
            - --force
            {{- end }}
          volumeMounts:
            - name: shared-data
              mountPath: /root/.nodes
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" . }}
{{- end }}
