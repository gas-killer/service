apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "gas-killer.serviceaccount.fullname" .) .Values.secretManager.serviceAccountName }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
  {{- if .Values.secretManager.enabled }}
  annotations:
    # Bind this Kubernetes SA to the GCP SA created by Terraform for Workload Identity.
    iam.gke.io/gcp-service-account: {{ required "secretManager.gcpServiceAccount is required when secretManager.enabled=true" .Values.secretManager.gcpServiceAccount | quote }}
  {{- end }}
