{{- $root := . -}}
{{- $nodeCount := int .Values.global.nodeCount -}}
{{- range $i := until $nodeCount }}
{{- $nodeIndex := add $i 1 }}
{{- $nodePort := add (int $root.Values.node.basePort) $i }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gas-killer.node.fullname" $root }}-{{ $nodeIndex }}
  labels:
    {{- include "gas-killer.labels" $root | nindent 4 }}
    app.kubernetes.io/component: node
    gas-killer/node-index: {{ $nodeIndex | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gas-killer.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: node
      gas-killer/node-index: {{ $nodeIndex | quote }}
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: node
        gas-killer/node-index: {{ $nodeIndex | quote }}
    spec:
      terminationGracePeriodSeconds: {{ $root.Values.node.terminationGracePeriodSeconds }}
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $root.Values.secretManager.enabled }}
      serviceAccountName: {{ default (include "gas-killer.serviceaccount.fullname" $root) $root.Values.secretManager.serviceAccountName }}
      {{- end }}
      initContainers:
        {{- if and (eq $root.Values.global.environment "TESTNET") $root.Values.secretManager.enabled }}
        # Fetch BLS key and avs_deploy.json from GCP Secret Manager.
        # Workload Identity provides authentication — no static credentials needed.
        - name: fetch-secrets
          image: {{ $root.Values.secretManager.cloudSdkImage | quote }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              PROJECT="{{ required "secretManager.projectId is required when secretManager.enabled=true" $root.Values.secretManager.projectId }}"
              PREFIX="{{ $root.Values.secretManager.keyPrefix }}"
              TIMEOUT={{ $root.Values.global.initTimeout }}
              ELAPSED=0

              # Retry until secrets exist — on a fresh install the key-export hook
              # job may still be running when this init container starts.
              echo "Fetching BLS key for node {{ $nodeIndex }} (timeout: ${TIMEOUT}s)..."
              until gcloud secrets versions access latest \
                --secret="${PREFIX}-node-{{ $nodeIndex }}-bls-key" \
                --project="$PROJECT" \
                > /app/secrets/bls-key.json 2>/dev/null; do
                if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                  echo "ERROR: Timeout waiting for secret ${PREFIX}-node-{{ $nodeIndex }}-bls-key after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Secret ${PREFIX}-node-{{ $nodeIndex }}-bls-key not available yet, retrying... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "BLS key fetched successfully"

              ELAPSED=0
              echo "Fetching avs_deploy.json (timeout: ${TIMEOUT}s)..."
              until gcloud secrets versions access latest \
                --secret="${PREFIX}-avs-deploy" \
                --project="$PROJECT" \
                > /app/secrets/avs_deploy.json 2>/dev/null; do
                if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                  echo "ERROR: Timeout waiting for secret ${PREFIX}-avs-deploy after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Secret ${PREFIX}-avs-deploy not available yet, retrying... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Secrets fetched successfully"
          volumeMounts:
            - name: node-secrets
              mountPath: /app/secrets
        {{- else }}
        # Wait for setup job to fully complete (check for .setup_complete marker)
        # This ensures operators are registered in the quorum before nodes start
        - name: wait-for-setup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for setup to complete (timeout: {{ $root.Values.global.initTimeout }}s)..."
              KEY_FILE="/app/.nodes/operator_keys/testacc{{ $nodeIndex }}.private.bls.key.json"
              TIMEOUT={{ $root.Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.setup_complete ] && [ -f "$KEY_FILE" ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for setup to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Setup not complete, waiting for .setup_complete marker and $KEY_FILE... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Setup complete! Key file found at $KEY_FILE"
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
        {{- end }}

        {{- if $root.Values.bridge.waitForBridge }}
        # Wait for bridge job to complete before starting the node
        # The bridge creates a .bridge_complete marker when done
        - name: wait-for-bridge
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for bridge to complete (timeout: {{ $root.Values.global.initTimeout }}s)..."
              TIMEOUT={{ $root.Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.bridge_complete ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for bridge to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Bridge not complete, waiting for .bridge_complete marker... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Bridge complete!"
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
        {{- end }}

        {{- if eq $root.Values.global.environment "LOCAL" }}
        # Wait for L1 RPC to be accessible before starting the node (LOCAL mode only)
        - name: wait-for-l1
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for L1 RPC (timeout: {{ $root.Values.global.initTimeout }}s)..."
              TIMEOUT={{ $root.Values.global.initTimeout }}
              ELAPSED=0
              until nc -z {{ include "gas-killer.l1.fullname" $root }} {{ $root.Values.l1.service.port }}; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for L1 RPC after ${TIMEOUT}s"
                  exit 1
                fi
                echo "L1 not ready, waiting... (${ELAPSED}s elapsed)"
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "L1 is ready!"
        {{- end }}

      containers:
        - name: node
          image: "{{ $root.Values.node.image.repository }}:{{ required "node.image.tag must be set" $root.Values.node.image.tag }}"
          imagePullPolicy: {{ $root.Values.node.image.pullPolicy }}
          args:
            - "--key-file"
            {{- if and (eq $root.Values.global.environment "TESTNET") $root.Values.secretManager.enabled }}
            - "/app/secrets/bls-key.json"
            {{- else }}
            - "/app/.nodes/operator_keys/testacc{{ $nodeIndex }}.private.bls.key.json"
            {{- end }}
            - "--port"
            - {{ $nodePort | quote }}
            - "--orchestrator"
            {{- if $root.Values.orchestrator.publicConfig }}
            # Use public orchestrator from configmap if provided
            - "/app/public_orchestrator.json"
            {{- else }}
            # Use public orchestrator from the image if not provided via configmap
            - "/app/config/public_orchestrator.json"
            {{- end }}
          env:
            {{- if eq $root.Values.global.environment "TESTNET" }}
            # TESTNET mode (no L2): Use external RPC from secret
            - name: HTTP_RPC
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" $root }}
                  key: HTTP_RPC
            - name: WS_RPC
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" $root }}
                  key: WS_RPC
            {{- else }}
            # LOCAL mode: Use local L1 Anvil service
            - name: HTTP_RPC
              value: "http://{{ include "gas-killer.l1.fullname" $root }}:{{ $root.Values.l1.service.port }}"
            - name: WS_RPC
              value: "ws://{{ include "gas-killer.l1.fullname" $root }}:{{ $root.Values.l1.service.port }}"
            {{- end }}
            {{- if and (eq $root.Values.global.environment "LOCAL") $root.Values.l2.enabled }}
            - name: L2_HTTP_RPC
              value: "http://{{ include "gas-killer.l2.fullname" $root }}:{{ $root.Values.l2.service.port }}"
            {{- end }}
            - name: RUST_BACKTRACE
              value: "1"
            - name: AVS_DEPLOYMENT_PATH
              {{- if and (eq $root.Values.global.environment "TESTNET") $root.Values.secretManager.enabled }}
              value: "/app/secrets/avs_deploy.json"
              {{- else }}
              value: "/app/.nodes/avs_deploy.json"
              {{- end }}
            - name: HEALTHZ_PORT
              value: {{ $root.Values.node.healthzPort | quote }}
          ports:
            - name: node
              containerPort: {{ $nodePort }}
              protocol: TCP
            - name: healthz
              containerPort: {{ $root.Values.node.healthzPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
            {{- if and (eq $root.Values.global.environment "TESTNET") $root.Values.secretManager.enabled }}
            - name: node-secrets
              mountPath: /app/secrets
              readOnly: true
            {{- end }}
            {{- if $root.Values.orchestrator.publicConfig }}
            - name: config
              mountPath: /app/public_orchestrator.json
              subPath: public_orchestrator.json
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml $root.Values.node.resources | nindent 12 }}

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" $root }}
        {{- if and (eq $root.Values.global.environment "TESTNET") $root.Values.secretManager.enabled }}
        - name: node-secrets
          emptyDir: {}
        {{- end }}
        {{- if $root.Values.orchestrator.publicConfig }}
        - name: config
          configMap:
            name: {{ include "gas-killer.config.fullname" $root }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gas-killer.node.fullname" $root }}-{{ $nodeIndex }}
  labels:
    {{- include "gas-killer.labels" $root | nindent 4 }}
    app.kubernetes.io/component: node
    gas-killer/node-index: {{ $nodeIndex | quote }}
spec:
  type: ClusterIP
  # CRITICAL: Allow traffic to pods before they pass readiness probes
  # This is required because nodes need to dial each other during P2P startup
  # Without this, services have no endpoints until pods are ready, creating a deadlock
  publishNotReadyAddresses: true
  ports:
    - port: {{ $nodePort }}
      targetPort: node
      protocol: TCP
      name: node
  selector:
    {{- include "gas-killer.selectorLabels" $root | nindent 4 }}
    app.kubernetes.io/component: node
    gas-killer/node-index: {{ $nodeIndex | quote }}
{{- end }}
