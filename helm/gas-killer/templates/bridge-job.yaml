{{- /* Bridge job runs after setup to bridge operator state from L1 to L2 */ -}}
{{- if .Values.bridge.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gas-killer.bridge.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: bridge
  annotations:
    # Run after the main setup job completes
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bridge
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for setup job to complete (avs_deploy.json must exist)
        - name: wait-for-setup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for setup to complete (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.setup_complete ] && [ -f /app/.nodes/avs_deploy.json ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for setup to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Setup not complete, waiting for .setup_complete marker and avs_deploy.json... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Setup complete! avs_deploy.json found."
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true

      containers:
        - name: bridge
          image: "{{ .Values.bridge.image.repository }}:{{ .Values.bridge.image.tag }}"
          imagePullPolicy: {{ .Values.bridge.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              LOG_FILE="/app/.nodes/bridge.log"

              echo "=== Bridge Container Starting at $(date) ===" | tee -a "$LOG_FILE"

              # Read registry coordinator address from avs_deploy.json
              # The bridge image has jq installed; try both camelCase and PascalCase field names
              export REGISTRY_COORDINATOR_ADDRESS=$(jq -r '.addresses.registryCoordinator // .addresses.RegistryCoordinator' /app/.nodes/avs_deploy.json)
              echo "[BRIDGE] REGISTRY_COORDINATOR_ADDRESS: $REGISTRY_COORDINATOR_ADDRESS" | tee -a "$LOG_FILE"
              echo "[BRIDGE] L1_RPC_URL: $L1_RPC_URL" | tee -a "$LOG_FILE"
              echo "[BRIDGE] L2_RPC_URL: $L2_RPC_URL" | tee -a "$LOG_FILE"
              echo "[BRIDGE] PRIVATE_KEY is set: $([ -n "$PRIVATE_KEY" ] && echo 'yes' || echo 'no')" | tee -a "$LOG_FILE"

              if [ -z "$REGISTRY_COORDINATOR_ADDRESS" ] || [ "$REGISTRY_COORDINATOR_ADDRESS" = "null" ]; then
                echo "ERROR: Could not find RegistryCoordinator address in avs_deploy.json" | tee -a "$LOG_FILE"
                jq '.addresses' /app/.nodes/avs_deploy.json | tee -a "$LOG_FILE"
                exit 1
              fi

              echo "=== Executing bridge-to-l2.sh ===" | tee -a "$LOG_FILE"
              /app/scripts/bridge-to-l2.sh 2>&1 | tee -a "$LOG_FILE"
              EXIT_CODE=$?
              echo "=== bridge-to-l2.sh exited with code: $EXIT_CODE at $(date) ===" | tee -a "$LOG_FILE"

              if [ $EXIT_CODE -eq 0 ]; then
                # Copy both deploy files to shared volume
                if [ -f /app/contracts/artifacts/l1-deploy.json ]; then
                  cp /app/contracts/artifacts/l1-deploy.json /app/.nodes/l1-deploy.json
                  chmod 644 /app/.nodes/l1-deploy.json
                  echo "l1-deploy.json copied to shared volume" | tee -a "$LOG_FILE"
                fi

                if [ -f /app/contracts/artifacts/l2-deploy.json ]; then
                  cp /app/contracts/artifacts/l2-deploy.json /app/.nodes/l2-deploy.json
                  chmod 644 /app/.nodes/l2-deploy.json
                  echo "l2-deploy.json copied to shared volume" | tee -a "$LOG_FILE"
                fi

                # Write completion marker
                touch /app/.nodes/.bridge_complete
                chmod 644 /app/.nodes/.bridge_complete
                echo "Bridge completion marker created" | tee -a "$LOG_FILE"
              fi

              exit $EXIT_CODE
          env:
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: PRIVATE_KEY
            {{- if eq .Values.global.environment "TESTNET" }}
            # TESTNET mode: Use external RPC from secret
            - name: L1_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: RPC_URL
            - name: L2_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: L2_RPC_URL
            {{- else }}
            # LOCAL mode: Use local Anvil services
            - name: L1_RPC_URL
              value: "http://{{ include "gas-killer.ethereum.fullname" . }}:{{ .Values.ethereum.service.port }}"
            {{- if .Values.gnosis.enabled }}
            # Use local Gnosis Anvil fork
            - name: L2_RPC_URL
              value: "http://{{ include "gas-killer.gnosis.fullname" . }}:{{ .Values.gnosis.service.port }}"
            {{- else }}
            # Use external L2 RPC
            - name: L2_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: L2_RPC_URL
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
          resources:
            {{- toYaml .Values.bridge.resources | nindent 12 }}

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" . }}
{{- end }}
