{{- /* Bridge job runs after setup to bridge operator state from L1 to L2 */ -}}
{{- if .Values.bridge.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gas-killer.bridge.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: bridge
  annotations:
    # Run after the main setup job completes
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bridge
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for setup job to complete (avs_deploy.json must exist)
        - name: wait-for-setup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for setup to complete (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.setup_complete ] && [ -f /app/.nodes/avs_deploy.json ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for setup to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Setup not complete, waiting for .setup_complete marker and avs_deploy.json... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Setup complete! avs_deploy.json found."
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true

        # Extract registry coordinator address from avs_deploy.json
        - name: extract-registry-coordinator
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache jq
              echo "=== avs_deploy.json contents ==="
              cat /app/.nodes/avs_deploy.json
              echo ""
              echo "=== Extracting RegistryCoordinator address ==="

              # Try different possible field names for registry coordinator
              REGISTRY_ADDR=$(jq -r '.addresses.RegistryCoordinator // .addresses.registryCoordinator // .addresses.registry_coordinator // .addresses.registryCoordinatorProxy // empty' /app/.nodes/avs_deploy.json 2>/dev/null)

              if [ -z "$REGISTRY_ADDR" ] || [ "$REGISTRY_ADDR" = "null" ]; then
                echo "ERROR: Could not find RegistryCoordinator address in avs_deploy.json"
                echo "Available addresses:"
                jq '.addresses' /app/.nodes/avs_deploy.json
                exit 1
              fi

              echo "Found RegistryCoordinator: $REGISTRY_ADDR"
              echo "$REGISTRY_ADDR" > /bridge-config/registry_coordinator_address
              echo "Wrote to /bridge-config/registry_coordinator_address"
              cat /bridge-config/registry_coordinator_address
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true
            - name: bridge-config
              mountPath: /bridge-config

      containers:
        - name: bridge
          image: "{{ .Values.bridge.image.repository }}:{{ .Values.bridge.image.tag }}"
          imagePullPolicy: {{ .Values.bridge.image.pullPolicy }}
          # Set REGISTRY_COORDINATOR_ADDRESS from file and run the image's entrypoint
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "=== Bridge Container Starting ==="
              echo "Checking /bridge-config contents..."
              ls -la /bridge-config/ || echo "Cannot list /bridge-config"

              if [ ! -f /bridge-config/registry_coordinator_address ]; then
                echo "ERROR: /bridge-config/registry_coordinator_address not found!"
                exit 1
              fi

              export REGISTRY_COORDINATOR_ADDRESS=$(cat /bridge-config/registry_coordinator_address)
              echo "[BRIDGE] REGISTRY_COORDINATOR_ADDRESS: $REGISTRY_COORDINATOR_ADDRESS"
              echo "[BRIDGE] L1_RPC_URL: $L1_RPC_URL"
              echo "[BRIDGE] L2_RPC_URL: $L2_RPC_URL"
              echo "[BRIDGE] PRIVATE_KEY is set: $([ -n \"$PRIVATE_KEY\" ] && echo 'yes' || echo 'no')"

              echo "=== Checking bridge script ==="
              ls -la /app/scripts/ || echo "Cannot list /app/scripts"

              if [ ! -f /app/scripts/bridge-to-l2.sh ]; then
                echo "ERROR: /app/scripts/bridge-to-l2.sh not found!"
                echo "Checking /app directory structure..."
                find /app -type f 2>/dev/null | head -50 || true
                exit 1
              fi

              echo "=== Executing bridge script ==="
              exec /app/scripts/bridge-to-l2.sh
          env:
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: PRIVATE_KEY
            {{- if eq .Values.global.environment "TESTNET" }}
            # TESTNET mode: Use external RPC from secret
            - name: L1_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: RPC_URL
            {{- else }}
            # LOCAL mode: Use local Anvil service
            - name: L1_RPC_URL
              value: "http://{{ include "gas-killer.ethereum.fullname" . }}:{{ .Values.ethereum.service.port }}"
            {{- end }}
            - name: L2_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: L2_RPC_URL
          volumeMounts:
            - name: bridge-config
              mountPath: /bridge-config
              readOnly: true
          resources:
            {{- toYaml .Values.bridge.resources | nindent 12 }}

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" . }}
        - name: bridge-config
          emptyDir: {}
{{- end }}
