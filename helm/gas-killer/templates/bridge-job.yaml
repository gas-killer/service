{{- /* Bridge job runs after setup to bridge operator state from L1 to L2 */ -}}
{{- if .Values.bridge.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gas-killer.bridge.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
    app.kubernetes.io/component: bridge
  annotations:
    # Run after the main setup job completes
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "gas-killer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bridge
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait for setup job to complete (avs_deploy.json must exist)
        - name: wait-for-setup
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for setup to complete (timeout: {{ .Values.global.initTimeout }}s)..."
              TIMEOUT={{ .Values.global.initTimeout }}
              ELAPSED=0
              until [ -f /app/.nodes/.setup_complete ] && [ -f /app/.nodes/avs_deploy.json ]; do
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "ERROR: Timeout waiting for setup to complete after ${TIMEOUT}s"
                  exit 1
                fi
                echo "Setup not complete, waiting for .setup_complete marker and avs_deploy.json... (${ELAPSED}s elapsed)"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "Setup complete! avs_deploy.json found."
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
              readOnly: true

      containers:
        - name: bridge
          image: "{{ .Values.bridge.image.repository }}:{{ .Values.bridge.image.tag }}"
          imagePullPolicy: {{ .Values.bridge.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              LOG_FILE="/app/.nodes/bridge.log"
              exec > >(tee -a "$LOG_FILE") 2>&1

              echo "=== Bridge Container Starting at $(date) ==="

              # Create env file required by target-contracts config.sh
              cat > /tmp/bridge.env << EOF
              DEPLOYER_KEY=${PRIVATE_KEY}
              L1_RPC_URL=${L1_RPC_URL}
              L2_RPC_URL=${L2_RPC_URL}
              SP1HELIOS_ADDRESS=0x0000000000000000000000000000000000000001
              IS_SP1HELIOS_MOCK=1
              L1_ETHERSCAN_API_KEY=
              L2_ETHERSCAN_API_KEY=
              EOF

              # Set Docker context vars for config.sh
              export IS_DOCKER=true
              export SCRIPTS_DIR=/app/scripts
              export ARTIFACTS_DIR=/app/contracts/artifacts
              export NODES_DIR=/app/.nodes
              export E2E_ENV_FILE=/tmp/bridge.env
              export FOUNDRY_ROOT_DIR=/app/contracts

              mkdir -p /app/contracts/artifacts

              echo "=== avs_deploy.json contents ==="
              cat /app/.nodes/avs_deploy.json
              echo ""

              echo "=== Step 1: Deploying bridge contracts (L1 + L2) ==="
              /app/scripts/deploy-bridge.sh
              echo "Deploy complete. Checking artifacts..."
              ls -la /app/contracts/artifacts/

              echo ""
              echo "=== Step 2: Updating middleware shim on L1 ==="
              /app/scripts/update-shim.sh

              echo ""
              echo "=== Step 3: Generating mock proof ==="
              /app/scripts/generate-mock-proof.sh 1234

              echo ""
              echo "=== Step 4: Updating mimic on L2 (populates operator arrays) ==="
              /app/scripts/update-mimic.sh

              echo ""
              echo "=== Bridge flow complete, copying artifacts ==="

              # Copy both deploy files to shared volume
              cp /app/contracts/artifacts/l1-deploy.json /app/.nodes/l1-deploy.json
              chmod 644 /app/.nodes/l1-deploy.json
              echo "l1-deploy.json copied to shared volume"

              cp /app/contracts/artifacts/l2-deploy.json /app/.nodes/l2-deploy.json
              chmod 644 /app/.nodes/l2-deploy.json
              echo "l2-deploy.json copied to shared volume"

              # Write completion marker
              touch /app/.nodes/.bridge_complete
              chmod 644 /app/.nodes/.bridge_complete
              echo "Bridge completion marker created"

              echo "=== Bridge Job SUCCEEDED at $(date) ==="
          env:
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: PRIVATE_KEY
            - name: DEPLOYER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: PRIVATE_KEY
            {{- if eq .Values.global.environment "TESTNET" }}
            # TESTNET mode: Use external RPC from secret
            - name: L1_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: RPC_URL
            - name: L2_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: L2_RPC_URL
            {{- else }}
            # LOCAL mode: Use local Anvil services
            - name: L1_RPC_URL
              value: "http://{{ include "gas-killer.ethereum.fullname" . }}:{{ .Values.ethereum.service.port }}"
            {{- if .Values.gnosis.enabled }}
            # Use local Gnosis Anvil fork
            - name: L2_RPC_URL
              value: "http://{{ include "gas-killer.gnosis.fullname" . }}:{{ .Values.gnosis.service.port }}"
            {{- else }}
            # Use external L2 RPC
            - name: L2_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "gas-killer.secret.fullname" . }}
                  key: L2_RPC_URL
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: shared-data
              mountPath: /app/.nodes
          resources:
            {{- toYaml .Values.bridge.resources | nindent 12 }}

      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "gas-killer.shareddata.fullname" . }}
{{- end }}
