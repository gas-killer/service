{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gas-killer.secret.fullname" . }}
  labels:
    {{- include "gas-killer.labels" . | nindent 4 }}
type: Opaque
stringData:
  PRIVATE_KEY: {{ required "secrets.privateKey is required" .Values.secrets.privateKey | quote }}
  FUNDED_KEY: {{ required "secrets.fundedKey is required" .Values.secrets.fundedKey | quote }}
  {{- if .Values.secrets.forkUrl }}
  FORK_URL: {{ .Values.secrets.forkUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.httpRpc }}
  HTTP_RPC: {{ .Values.secrets.httpRpc | quote }}
  {{/* Derive WebSocket URL from HTTP URL (https:// -> wss://) */}}
  WS_RPC: {{ .Values.secrets.httpRpc | replace "https://" "wss://" | replace "http://" "ws://" | quote }}
  {{- end }}
  {{- if .Values.secrets.l2ForkUrl }}
  # L2 Fork URL for LOCAL mode L2 Anvil
  L2_FORK_URL: {{ .Values.secrets.l2ForkUrl | quote }}
  {{- end }}
  {{- if .Values.orchestrator.routerPrivateKey }}
  # Router orchestrator private key (BLS private key for the router)
  # If not provided, the router will use /app/config/router_orchestrator.json from the image
  ROUTER_ORCHESTRATOR_PRIVATE_KEY: {{ .Values.orchestrator.routerPrivateKey | quote }}
  {{- end }}
  {{- if and .Values.l2 .Values.l2.httpRpc }}
  # L2 RPC URL for TESTNET mode multi-chain operation
  L2_HTTP_RPC: {{ .Values.l2.httpRpc | quote }}
  L2_WS_RPC: {{ .Values.l2.httpRpc | replace "https://" "wss://" | replace "http://" "ws://" | quote }}
  {{- end }}
{{- end }}
