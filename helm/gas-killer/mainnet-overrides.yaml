# Stable mainnet configuration. Pass on every mainnet upgrade.
#
# Usage:
#   helm upgrade --install gas-killer ./helm/gas-killer \
#     -f helm/gas-killer/mainnet-overrides.yaml \
#     --set secrets.privateKey=0x... \
#     --set secrets.fundedKey=0x... \
#     --set secrets.httpRpc=https://... \
#     --set secrets.l2HttpRpc=https://... \
#     --set secrets.adminKey=<admin-key> \
#     --set l2.enabled=true \
#     --set router.image.tag=router-<sha> \
#     --set node.image.tag=node-<sha> \
#     --set kube-prometheus-stack.grafana.adminPassword=<password>

global:
  environment: TESTNET

imagePullSecrets:
  - name: ghcr-pull-secret

secretManager:
  enabled: true
  projectId: gas-killer-mainnet
  keyPrefix: gas-killer-mainnet
  gcpServiceAccount: gas-killer-app@gas-killer-mainnet.iam.gserviceaccount.com

eigenlayer:
  contracts:
    delegationManager: "0x39053D51B77DC0d36036Fc1fCc8Cb819df8Ef37A"
    strategyManager: "0x858646372CC42E1A627fcE94aa7A7033e7CF075A"
    lstContract: "0xae7ab96520DE3A18E5e111B5EaAb095312D7fE84"
    lstStrategy: "0x93c4b944D05dfe6df7645A86cd2206016c51564D"
    allocationManager: "0x948a420b8CC1d6BFd0B6087C2E7c344a2CD0bc39"
  quorum:
    minimumStake: "100000000000000000"   # 0.1 stETH
    maxOperatorCount: 4
    kickBIPsOfOperatorStake: 10000
    kickBIPsOfTotalStake: 100
  sdk:
    quorumThreshold: "2"
    thresholdDenominator: "3"
    blockStaleMeasure: "300"

ingress:
  enabled: true
  host: mainnet.gaskiller.xyz

monitoring:
  enabled: true
  grafana:
    ingress:
      enabled: true
      host: grafana.gaskiller.xyz

router:
  ingress:
    timeoutMs: "0"
