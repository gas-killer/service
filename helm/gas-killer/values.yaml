# Default values for gas-killer Helm chart

# Image pull secrets for private registries (e.g. ghcr.io/gas-killer/service).
# Create the secret first:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<github-username> \
#     --docker-password=<github-pat>
# Then reference it here:
#   --set 'imagePullSecrets[0].name=ghcr-pull-secret'
imagePullSecrets: []

# Global settings
global:
  # Environment mode: LOCAL or TESTNET
  # LOCAL: Uses Anvil with forked L1, auto-deploys AVS contracts to local fork
  #        Requires: secrets.forkUrl (L1 RPC to fork from)
  # TESTNET: Connects directly to real L1 network
  #          Requires: secrets.httpRpc (L1 RPC endpoint)
  #          AVS contracts are deployed to real L1
  environment: LOCAL

  # Number of operator nodes to deploy
  nodeCount: 3

  # Timeout for init containers waiting for dependencies (in seconds)
  initTimeout: 300

# GCP Secret Manager configuration for TESTNET deployments
# When enabled, operator BLS keys and avs_deploy.json are read from GCP Secret Manager
# rather than the shared PVC. This makes keys durable across cluster recreations.
#
# Setup:
#   1. Provision the GKE cluster and GCP service account(s) via Terraform in the
#      gas-killer/infra repo (terraform/dev or terraform/prod)
#   2. Copy the service account email output into secretManager.gcpServiceAccount below
#      (dev: gcp_service_account_email; prod: app_service_account_email)
#   3. Set secretManager.projectId to your GCP project ID
#
# Secret naming in GCP Secret Manager:
#   {keyPrefix}-node-{N}-bls-key   (one per operator node)
#   {keyPrefix}-avs-deploy          (avs_deploy.json from the setup job)
#
# These secrets are created automatically by the key-export job on first helm install.
secretManager:
  enabled: false
  projectId: ""
  keyPrefix: "gas-killer"
  # GCP Service Account email for Workload Identity. Copy from the gas-killer/infra
  # terraform output (dev: gcp_service_account_email; prod: app_service_account_email):
  #   terraform output -raw app_service_account_email
  gcpServiceAccount: ""
  # Kubernetes ServiceAccount name. Defaults to <release>-sa (e.g. "gas-killer-sa").
  # Must match the gas-killer/infra terraform var kubernetes_service_account_name.
  # Override if your release name differs from what Terraform expects:
  #   --set secretManager.serviceAccountName=my-release-sa
  serviceAccountName: ""
  # Pinned Google Cloud SDK image used by key-export, fetch-secrets, and fetch-avs-deploy containers.
  # Override to use a newer version: --set secretManager.cloudSdkImage=google/cloud-sdk:500.0.0-slim
  cloudSdkImage: "google/cloud-sdk:496.0.0-slim"

# Manual retry flags for one-time hook jobs.
# On helm install these jobs run automatically. On helm upgrade they are suppressed
# unless you explicitly opt in — preventing unrelated upgrades from re-triggering
# long-running operations.
#
# Usage:
#   helm upgrade gas-killer ./helm/gas-killer --set rerun.bridge=true
rerun:
  setup: false
  bridge: false
  keyExport: false
  # Re-run the deploy-target job to deploy a fresh demo target + checker against the current AVS.
  deployTarget: false
  # Re-run the generate-router-key job (TESTNET+secretManager only).
  # Only set this if you intentionally want to rotate the router BLS keypair —
  # doing so requires all nodes to restart and pick up the new public key from GCP.
  # Also triggers key-export so the new public key is uploaded to Secret Manager.
  generateRouterKey: false

# Secrets configuration
# All sensitive values should be provided via --set or existingSecret
secrets:
  # Use an existing Kubernetes secret instead of creating one
  # Required keys: PRIVATE_KEY, FUNDED_KEY, FORK_URL
  existingSecret: ""

  # Private keys for signing transactions
  # Override with: --set secrets.privateKey=<your-key>
  privateKey: ""
  fundedKey: ""

  # Fork URL for Anvil (contains API key - sensitive!)
  # REQUIRED for LOCAL mode - Anvil will fork from this RPC URL
  # Override with: --set secrets.forkUrl=<your-rpc-url>
  # Example: --set secrets.forkUrl=https://eth-sepolia.g.alchemy.com/v2/YOUR_KEY
  forkUrl: ""

  # Direct RPC URL for L1 (contains API key - sensitive!)
  # REQUIRED for TESTNET mode - nodes/router connect directly to this RPC
  # Override with: --set secrets.httpRpc=<your-rpc-url>
  # Example: --set secrets.httpRpc=https://eth-sepolia.g.alchemy.com/v2/YOUR_KEY
  httpRpc: ""

  # L2 Fork URL for local L2 Anvil (only used in LOCAL mode with l2.enabled=true)
  # Override with: --set secrets.l2ForkUrl=<your-l2-rpc-url>
  # Example: --set secrets.l2ForkUrl=https://rpc.gnosischain.com
  l2ForkUrl: ""

  # Direct RPC URL for L2 in TESTNET mode (contains API key - sensitive!)
  # Override with: --set secrets.l2HttpRpc=<your-l2-rpc-url>
  # Example: --set secrets.l2HttpRpc=https://rpc.gnosischain.com
  l2HttpRpc: ""

  # Static Bearer token password for ingress authentication.
  # Requests to /trigger must include: Authorization: Bearer <password>
  # Leave empty to disable authentication (default).
  # Override with: --set secrets.ingressPassword=<your-password>
  ingressPassword: ""

# L1 (Anvil) configuration - only used in LOCAL mode
l1:
  enabled: true
  image:
    repository: ghcr.io/breadchaincoop/ethereum
    tag: latest
    pullPolicy: IfNotPresent
  # Priority class for L1 pod - it holds critical blockchain state
  # Consider creating a custom priority class instead of using system-cluster-critical
  # See README.md for details
  priorityClassName: "system-cluster-critical"
  service:
    type: ClusterIP
    port: 8545
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# EigenLayer setup job configuration
eigenlayer:
  image:
    repository: ghcr.io/breadchaincoop/eigenlayer
    tag: latest
    pullPolicy: IfNotPresent
  # L1 contract addresses — required in all modes. In LOCAL mode these must match the
  # network being forked (forkUrl); in TESTNET mode they must match the live network.
  # No defaults: set these explicitly via an overrides file (e.g. testnet-overrides.yaml).
  contracts:
    delegationManager: ""
    strategyManager: ""
    lstContract: ""
    lstStrategy: ""
    allocationManager: ""
  quorum:
    # Minimum LST stake (in wei) required to register as an operator.
    # Combined with the 1 ether strategy multiplier in SetupMiddleware.s.sol, this is
    # effectively the minimum token amount. "1" = no real minimum (local/testnet only).
    minimumStake: "1"
    # Maximum number of operators in the quorum.
    maxOperatorCount: 4
    # BIPs of an operator's own stake that must be exceeded to kick them (10000 = 100%).
    kickBIPsOfOperatorStake: 10000
    # BIPs of total quorum stake below which an operator can be kicked (100 = 1%).
    kickBIPsOfTotalStake: 100
  # Immutable constructor parameters for AvsServiceManagerWrapper — baked into the
  # contract at deploy time. Cannot be changed without redeploying (rerun.setup=true).
  sdk:
    # Fraction of stake-weighted operators that must co-sign a task: threshold/denominator.
    # Default 2/3 = two-thirds supermajority.
    quorumThreshold: "2"
    thresholdDenominator: "3"
    # Maximum age (in blocks) of a valid reference block. At ~12s/block, 300 ≈ 1 hour.
    blockStaleMeasure: "300"
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Signer (Cerberus) configuration
signer:
  enabled: true
  image:
    repository: ghcr.io/layr-labs/cerberus
    tag: "0.0.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    grpcPort: 50051
    metricsPort: 9081
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Gas Killer Node configuration
node:
  image:
    # Production image built and pushed by the Docker CI/CD workflow on merge to main / release.
    # For local development, override with:
    #   --set node.image.repository=service --set node.image.tag=node-local --set node.image.pullPolicy=Never
    repository: ghcr.io/gas-killer/service
    tag: ""
    pullPolicy: IfNotPresent
  # Base port for nodes (node-1 uses basePort, node-2 uses basePort+1, etc.)
  basePort: 3001
  # Per-node socket address overrides for operators that run outside this cluster.
  #
  # By default, each node's on-chain socket address is the K8s-internal ClusterIP service
  # name (e.g. "gas-killer-node-1:3001"). Operators inside the same cluster can reach this
  # address, but operators on external networks cannot.
  #
  # Use this map to supply a publicly-reachable "host:port" for any node that needs to be
  # reachable from outside the cluster. Keys are 1-based node indices (as strings).
  # Any node whose index is not listed will continue to use the generated K8s service name.
  #
  # Networking requirements for external operators:
  #   - Each participating operator needs a static public IP or a stable DNS name.
  #   - The port must be reachable from all other operators and the router.
  #   - NAT/firewall rules must allow inbound TCP on the declared port.
  #   - There is currently no relay or NAT-traversal strategy; direct reachability is required.
  #
  # Example — node 1 runs externally, nodes 2-3 stay in-cluster:
  #   socketAddressOverrides:
  #     "1": "203.0.113.42:3001"
  socketAddressOverrides: {}
  # P2P channel message queue depth. Messages are dropped when the queue is full.
  # Increase for bursty workloads; the cost is memory proportional to message size.
  p2pMessageBacklog: 256
  # P2P channel rate limit in messages per second. Accepts floats (e.g. 0.5 = one
  # message every two seconds). Raising beyond gas-analyzer throughput causes queue buildup.
  p2pMessagesPerSecond: "1.0"
  # Port for the node's /healthz HTTP endpoint (used by Kubernetes probes)
  healthzPort: 8081
  # How long Kubernetes waits for a node to finish in-flight work after SIGTERM.
  # Must be >= the time needed to complete a validation + sign cycle. Production
  # transactions can take several minutes of EVMSketch compute (see the
  # roundTimeout comment), so 360s covers a full round plus buffer.
  terminationGracePeriodSeconds: 360
  # Stagger EigenSDK eth_getLogs backfill sweeps across nodes so at most one runs at a time.
  # node-1 starts immediately; node-N waits (N-1) * startupDelaySecsPerNode before launching.
  # The router waits nodeCount * startupDelaySecsPerNode. Set to 0 to disable.
  # Remove once the operator-state disk cache (service#275) is implemented.
  startupDelaySecsPerNode: 5
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "500m"

# Gas Killer Router configuration
router:
  image:
    # Production image built and pushed by the Docker CI/CD workflow on merge to main / release.
    # For local development, override with:
    #   --set router.image.repository=service --set router.image.tag=router-local --set router.image.pullPolicy=Never
    repository: ghcr.io/gas-killer/service
    tag: ""
    pullPolicy: IfNotPresent
  port: 3000
  ingressPort: 8080
  # Bind host for the task-ingress HTTP server.
  # 0.0.0.0 (all interfaces) is required in Kubernetes so the pod can receive
  # traffic from the Service. Override to 127.0.0.1 for local-only access.
  ingressBindHost: "0.0.0.0"
  # P2P channel message queue depth. Messages are dropped when the queue is full.
  # Increase for bursty workloads; the cost is memory proportional to message size.
  p2pMessageBacklog: 256
  # P2P channel rate limit in messages per second. Accepts floats (e.g. 0.5 = one
  # message every two seconds). Raising beyond gas-analyzer throughput causes queue buildup.
  p2pMessagesPerSecond: "1.0"
  # Port for the router's /healthz and /readyz HTTP endpoints (used by Kubernetes probes)
  healthzPort: 8081
  # How long Kubernetes waits for a router to finish in-flight work after SIGTERM.
  # Must be >= the time needed to complete an aggregation round, which is bounded by
  # roundTimeout (300s), so 360s lets an in-flight round finish plus buffer.
  terminationGracePeriodSeconds: 360
  # Max seconds the router waits for operator signatures on a round before abandoning
  # it and moving to the next queued task. The orchestrator submits immediately once
  # the signature threshold is reached, so this is a stalled-round recovery window,
  # not a throttle. Must comfortably exceed worst-case node compute + sign time
  # (production transactions can take several minutes of EVMSketch compute); the cost
  # of a larger value is that a round that never reaches quorum blocks the task queue
  # for the full window. Tune against gas_killer_p2p_round_trip_seconds and the
  # round-timeout panel in the Grafana dashboard.
  roundTimeout: "300"
  # How often (in seconds) the router re-sends the Start broadcast for an in-flight round
  # while waiting for signatures. Set longer than roundTimeout to disable intra-round
  # rebroadcasting entirely.
  rebroadcastInterval: "300"
  # Max seconds the executor waits for a verifyAndUpdate transaction receipt before
  # timing out the round and proceeding to the next one. Prevents an indefinite stall
  # under L1 mempool congestion or RPC degradation. Leave empty to use the per-chain
  # defaults baked into the router (L1: 120s, L2: 30s).
  receiptTimeoutSecs: ""
  ingress:
    enabled: true
    # IMPORTANT: Must be quoted string to prevent YAML from converting to scientific notation.
    # "0" means no timeout — router waits indefinitely for an incoming task.
    timeoutMs: "0"
  # AVS identity metadata served at GET /avs-metadata.
  # Set metadata.uri in config.json to the public URL of this endpoint
  # (e.g. https://api.gaskiller.xyz/avs-metadata) before calling updateAVSMetadataURI.
  avsMetadata:
    name: "Gas Killer"
    website: "https://gaskiller.xyz"
    description: "Verifiable off-chain compute service for EVM smart contracts via EigenLayer"
    logo: "https://gaskiller.xyz/brand/gk-wordmark-transparent.png"
    twitter: "https://x.com/gaskiller_"
    # Operator set entry included in the metadata JSON once the quorum is created on-chain.
    # Leave name empty to omit the operatorSets field (e.g. before first setup-job run).
    operatorSet:
      name: "Gas Analysis Quorum"
      id: "0"
      description: "BLS-aggregated operator set for verifiable gas analysis tasks"
      softwareName: "gas-killer-node"
      softwareDescription: "Receives tasks, runs EVM gas analysis, returns a BLS-signed result"
      softwareUrl: "https://github.com/gas-killer/service"
      slashingConditions: "Signing a conflicting result for the same task ID"
  service:
    type: ClusterIP
    port: 3000
    ingressPort: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "6Gi"
      cpu: "1000m"

# Orchestrator configuration
orchestrator:
  # Public orchestrator config fields — must be set for LOCAL mode.
  # The "address" field is automatically set to the router service name via the Helm template.
  # Omitted when secretManager.enabled=true (TESTNET): nodes fetch the key from GCP instead.
  publicConfig:
    g2_x1: "20265730220917057623326116620721648047640065506233168445998945605458084341755"
    g2_x2: "1537141129484558011683382469842956131676085503509229854572844956364492197092"
    g2_y1: "4380068110839997539835821427545270098552639074995346826656804866303457881635"
    g2_y2: "479676018937294309080674601592141614301396550682703157902264620243097107417"
    port: "3000"
  # Router BLS private key — two mutually exclusive paths:
  #   1. secretManager.enabled=true (TESTNET): auto-generated by the generate-router-key
  #      job and fetched from GCP Secret Manager at pod start. Do NOT set routerPrivateKey.
  #   2. routerPrivateKey set explicitly: valid for LOCAL mode and for TESTNET deployments
  #      that opt out of Secret Manager (secretManager.enabled=false). Required on TESTNET
  #      if secretManager is disabled — the chart will fail install if neither is set.
  routerPrivateKey: ""

# L2 (Anvil fork) configuration - only used in LOCAL mode
# Defaults to disabled; enable explicitly via --set l2.enabled=true (e.g. in CI)
l2:
  enabled: false
  image:
    repository: ghcr.io/breadchaincoop/ethereum
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8546
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"
      cpu: "1000m"

# Bridge configuration - bridges EigenLayer operator state from L1 to L2
bridge:
  enabled: true
  # Wait for bridge job to complete before starting nodes/router
  waitForBridge: true
  image:
    repository: ghcr.io/breadchaincoop/target-contracts/bridge
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Deploy-target job: deploys a demo GasKillerSDK target (ArraySummation) wired to a real
# BLSSignatureChecker against the freshly-deployed AVS, then publishes its address to a
# ConfigMap for the local smoke test. Opt-in (off by default; enable on testnet).
deployTarget:
  enabled: false
  image:
    # Built from gas-killer/solidity-sdk (forge + the SDK contracts). Tag must be set at deploy.
    repository: ghcr.io/gas-killer/solidity-sdk
    tag: ""
    pullPolicy: IfNotPresent
  # Image used by the publish step to write the ConfigMap (needs kubectl + a shell).
  # Alpine-based (has /bin/sh for the apply pipe); bitnami/kubectl was retired from Docker Hub.
  kubectlImage: "alpine/kubectl:1.33.4"
  # ConfigMap that receives the deployed target address under key "target".
  configMapName: gas-killer-smoke-target
  # Secret key (in the app secret) holding the funded deployer key: PRIVATE_KEY or FUNDED_KEY.
  deployerSecretKey: PRIVATE_KEY
  # ArraySummation constructor params. Smoke test sums indexes [1,2,3], so arraySize must be >= 4.
  arraySize: 10
  maxValue: 10000
  arraySeed: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

# Yield Distribution test configuration - only used in LOCAL mode with l2.enabled
# Defaults to disabled; enable explicitly via --set yieldDistribution.enabled=true (e.g. in CI)
yieldDistribution:
  enabled: false
  # YieldDistributor contract address on L2
  contractAddress: "0x37A9CC16412CDA9b4f9B1ABdedd3e10BAD8A06da"
  # Owner of the YieldDistributor on the fork (used for anvil impersonation)
  ownerAddress: "0x5DD2e7db868e33c03daB85d0C623048A7980634E"
  # BLSSigCheckOperatorStateRetriever address on the L2 fork
  # In LOCAL mode this is the address present on the forked L2 chain
  blsSigCheckAddress: "0x056A41125bB62168B464ddDECd995e8494448913"
  # Test-friendly overrides applied via contract setters
  cycleLength: 1
  # Set to a large number to disable block staleness detection
  blockStaleMeasure: "100000000"
  # Fallback block number used if eth_blockNumber RPC call fails during setup
  # "Recent" Gnosis mainnet block number, but blockstaleness detection is disabled on fallback
  fallbackBlockNumber: "44000000"
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"
      cpu: "1000m"

# Shared data volume for keys and deployment configs
sharedData:
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce

# =============================================================================
# Log aggregation — Loki + Alloy
# =============================================================================
# Set loki.enabled and alloy.enabled to true to deploy a Loki instance and
# an Alloy DaemonSet that ships pod logs to it.
# Alloy is the successor to Promtail (deprecated).
#
# Usage:
#   helm dependency update ./helm/gas-killer
#   helm upgrade --install gas-killer ./helm/gas-killer \
#     --set loki.enabled=true \
#     --set alloy.enabled=true
#
# Loki will be reachable inside the cluster at:
#   http://{{ .Release.Name }}-loki:3100
#
loki:
  enabled: false
  # Loki in single-binary mode — suitable for testnet / dev deployments
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
  # Disable components not needed in single-binary mode
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

alloy:
  enabled: false
  # Alloy is deployed as a DaemonSet so every node's pod logs are collected.
  # The config (including the Loki push URL derived from .Release.Name) is generated
  # by templates/alloy-config.yaml in the parent chart, so it works for any release name.
  alloy:
    configMap:
      # Parent chart creates the ConfigMap; tell alloy not to create its own.
      create: false

# =============================================================================
# Monitoring — kube-prometheus-stack (Prometheus Operator, Grafana, AlertManager)
# =============================================================================
# Enable with: --set monitoring.enabled=true
#
# Usage:
#   helm dependency update ./helm/gas-killer
#   helm upgrade --install gas-killer ./helm/gas-killer \
#     --set monitoring.enabled=true \
#     --set kube-prometheus-stack.grafana.adminPassword=<password>
#
# Grafana will be reachable inside the cluster at:
#   http://{{ .Release.Name }}-grafana
#
# For external access, enable the Grafana ingress:
#   --set monitoring.grafana.ingress.enabled=true \
#   --set monitoring.grafana.ingress.host=grafana-testnet.gaskiller.xyz
#
monitoring:
  enabled: false

  grafana:
    ingress:
      enabled: false
      # Required when enabled — the public hostname for the Grafana UI.
      host: ""
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # Secret name for TLS certificate. Leave empty to disable TLS.
      tlsSecretName: grafana-tls

  # Per-component scrape toggles
  serviceMonitor:
    router:
      enabled: true
      interval: 15s
    node:
      enabled: true
      interval: 15s
    signer:
      enabled: true
      interval: 15s

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      # Match all ServiceMonitors — disable the helm-values override that would
      # silently replace {} with {matchLabels: {release: gas-killer}}
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorNamespaceSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}
      retention: 7d
      resources:
        requests:
          memory: 512Mi
          cpu: 200m
        limits:
          memory: 1Gi
          cpu: 500m

  grafana:
    # nameOverride keeps the service name predictable: {release}-grafana
    nameOverride: grafana
    # REQUIRED when monitoring.enabled=true — set via:
    #   --set kube-prometheus-stack.grafana.adminPassword=<password>
    adminPassword: ""
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          memory: 64Mi
          cpu: 10m
        limits:
          memory: 128Mi
          cpu: 50m

  # kube-state-metrics and node-exporter give us pod/node resource signals
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

  # Kubelet exposes cAdvisor metrics (container CPU/memory) — accessible on GKE worker nodes
  kubelet:
    enabled: true

  # Disable k8s control-plane exporters — not accessible on GKE
  coreDns:
    enabled: false
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false

  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false

  # We define our own alerting rules
  defaultRules:
    create: false

# =============================================================================
# Kubernetes Ingress for external access (optional)
# =============================================================================
# See helm/gas-killer/README.md for TLS / cert-manager setup instructions.
#
# Usage:
#   helm upgrade --install gas-killer ./helm/gas-killer \
#     --set ingress.enabled=true \
#     --set ingress.host=testnet.gaskiller.xyz
#
ingress:
  enabled: false
  # Required when enabled — the public hostname for the router ingress.
  host: ""
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Secret name for TLS certificate. Leave empty to disable TLS.
  tlsSecretName: gaskiller-tls
