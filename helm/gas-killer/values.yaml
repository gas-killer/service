# Default values for gas-killer Helm chart

# Global settings
global:
  # Environment mode: LOCAL or TESTNET
  # LOCAL: Uses Anvil with forked Sepolia, auto-deploys AVS contracts to local fork
  #        Requires: secrets.forkUrl (Sepolia RPC to fork from)
  # TESTNET: Connects directly to real Sepolia testnet
  #          Requires: secrets.rpcUrl (Sepolia RPC endpoint)
  #          AVS contracts are deployed to real Sepolia
  environment: LOCAL

  # Number of operator nodes to deploy
  nodeCount: 3

  # Timeout for init containers waiting for dependencies (in seconds)
  initTimeout: 300

# Secrets configuration
# All sensitive values should be provided via --set or existingSecret
secrets:
  # Use an existing Kubernetes secret instead of creating one
  # Required keys: PRIVATE_KEY, FUNDED_KEY, FORK_URL
  existingSecret: ""

  # Anvil default key - NEVER use in production!
  # Override with: --set secrets.privateKey=<your-key>
  privateKey: ""
  fundedKey: ""

  # Fork URL for Anvil (contains API key - sensitive!)
  # REQUIRED for LOCAL mode - Anvil will fork from this RPC URL
  # Override with: --set secrets.forkUrl=<your-rpc-url>
  # Example: --set secrets.forkUrl=https://eth-sepolia.g.alchemy.com/v2/YOUR_KEY
  forkUrl: ""

  # Direct RPC URL for Sepolia (contains API key - sensitive!)
  # REQUIRED for TESTNET mode - nodes/router connect directly to this RPC
  # Override with: --set secrets.rpcUrl=<your-rpc-url>
  # Example: --set secrets.rpcUrl=https://eth-sepolia.g.alchemy.com/v2/YOUR_KEY
  rpcUrl: ""

  # L2 Fork URL for local Gnosis Anvil (only used in LOCAL mode with gnosis.enabled=true)
  # Override with: --set secrets.l2ForkUrl=<your-gnosis-rpc-url>
  # Example: --set secrets.l2ForkUrl=https://rpc.gnosischain.com
  l2ForkUrl: ""

# Ethereum (Anvil) configuration - only used in LOCAL mode
ethereum:
  enabled: true
  image:
    repository: ghcr.io/breadchaincoop/ethereum
    tag: dev
    pullPolicy: IfNotPresent
  # Priority class for ethereum pod - it holds critical blockchain state
  # Consider creating a custom priority class instead of using system-cluster-critical
  # See README.md for details
  priorityClassName: "system-cluster-critical"
  service:
    type: ClusterIP
    port: 8545
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# EigenLayer setup job configuration
eigenlayer:
  image:
    repository: ghcr.io/breadchaincoop/eigenlayer
    tag: dev
    pullPolicy: Always
  # Sepolia testnet contract addresses (forked by Anvil in LOCAL mode)
  contracts:
    delegationManager: "0xD4A7E1Bd8015057293f0D0A557088c286942e84b"
    strategyManager: "0x2E3D6c0744b10eb0A4e6F679F71554a39Ec47a5D"
    lstContract: "0x00c71b0fcadE911B2feeE9912De4Fe19eB04ca56"
    lstStrategy: "0x8b29d91e67b013e855EaFe0ad704aC4Ab086a574"
    allocationManager: "0x42583067658071247ec8CE0A516A58f682002d07"
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Signer (Cerberus) configuration
signer:
  enabled: true
  image:
    repository: ghcr.io/layr-labs/cerberus
    tag: "0.0.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    grpcPort: 50051
    metricsPort: 9081
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Gas Killer Node configuration
node:
  image:
    # For local development, build and load the image into kind:
    # docker build -t gas-killer-node:local -f node/Dockerfile .
    # kind load docker-image gas-killer-node:local --name <cluster-name>
    repository: gas-killer-node
    tag: local
    pullPolicy: Never-dist-e2e
  # Base port for nodes (node-1 uses basePort, node-2 uses basePort+1, etc.)
  basePort: 3001
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Gas Killer Router configuration
router:
  image:
    # For local development, build and load the image into kind:
    # docker build -t gas-killer-router:local -f router/Dockerfile .
    # kind load docker-image gas-killer-router:local --name <cluster-name>
    repository: gas-killer-router
    tag: local
    pullPolicy: Never
  port: 3000
  ingressPort: 8080
  ingress:
    enabled: true
    # IMPORTANT: Must be quoted string to prevent YAML from converting to scientific notation (3e+06)
    # which Rust's u64 parser cannot handle
    timeoutMs: "3000000"  # 50 minutes
  service:
    type: ClusterIP
    port: 3000
    ingressPort: 8080
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Orchestrator configuration
# The orchestrator configs are included in the Docker image at /app/config/
# You can override them here if needed, otherwise they will be used from the image
orchestrator:
  # Public orchestrator config (JSON string) - optional override
  # If not provided, will use /app/config/public_orchestrator.json from the image
  # NOTE: The image file has "address": "router" which works for docker-compose.
  # For K8s, you need to override with the correct service name.
  # The service name will be: <release-name>-gas-killer-router
  publicConfig: |
    {
      "g2_x1": "20265730220917057623326116620721648047640065506233168445998945605458084341755",
      "g2_x2": "1537141129484558011683382469842956131676085503509229854572844956364492197092",
      "g2_y1": "4380068110839997539835821427545270098552639074995346826656804866303457881635",
      "g2_y2": "479676018937294309080674601592141614301396550682703157902264620243097107417",
      "port": "3000",
      "address": "gas-killer-router"
    }
  # Router private key (BLS private key) - stored in Secret for security
  # If not provided, will use /app/config/router_orchestrator.json from the image
  # WARNING: The image contains a default private key. For production, always provide your own!
  routerPrivateKey: ""

# Gnosis (Anvil fork for L2) configuration - only used in LOCAL mode
gnosis:
  enabled: true
  image:
    repository: ghcr.io/breadchaincoop/ethereum
    tag: dev
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8546
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"
      cpu: "1000m"

# Bridge configuration - bridges EigenLayer operator state from L1 to L2
bridge:
  enabled: true
  # Wait for bridge job to complete before starting nodes/router
  waitForBridge: true
  image:
    repository: ghcr.io/ronturetzky/target-contracts/bridge
    tag: pr-1
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# L2 Configuration (for Gnosis/multi-chain operation in TESTNET mode)
# When enabled, router/nodes will connect to real L2 RPC for AVS operations
l2:
  # Enable L2 AVS mode - router will use L2 RPC for AVS lookups (TESTNET only)
  enabled: false
  # L2 RPC URL (e.g., Gnosis mainnet)
  rpcUrl: ""
  # Path to L2 AVS deployment JSON (created by l2-avs-config job)
  avsDeploymentPath: "/app/.nodes/l2_avs_deploy.json"

# Yield Distribution test configuration - only used in LOCAL mode with gnosis.enabled
yieldDistribution:
  enabled: true
  # YieldDistributor contract address on Gnosis
  contractAddress: "0xeE95A62b749d8a2520E0128D9b3aCa241269024b"
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"

# Shared data volume for keys and deployment configs
sharedData:
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce

# Kubernetes Ingress for external access (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gas-killer.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
