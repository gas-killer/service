apiVersion: v2
name: gas-killer
description: A Helm chart for deploying Gas Killer Router AVS with EigenLayer integration
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - gas-killer
  - avs
  - eigenlayer
  - ethereum
maintainers:
  - name: BreadCoop

dependencies:
  - name: loki
    version: "6.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: alloy
    version: "1.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: alloy.enabled
  - name: kube-prometheus-stack
    version: "68.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
