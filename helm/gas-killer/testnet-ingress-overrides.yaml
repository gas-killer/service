# Helm override values for enabling HTTPS ingress via nginx-ingress + cert-manager.
# See README.md for one-time cluster setup instructions.
#
# Usage:
#   helm upgrade --install gas-killer ./helm/gas-killer \
#     -f helm/gas-killer/testnet-ingress-overrides.yaml \
#     -f <your-secrets-overrides>.yaml

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: testnet.gaskiller.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - testnet.gaskiller.xyz
      secretName: gaskiller-tls
