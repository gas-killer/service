# HTTPS ingress config via nginx-ingress + cert-manager.
# Pass this file when changing ingress/TLS configuration.
# See README.md for one-time cluster setup instructions.

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: testnet.gaskiller.xyz
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - testnet.gaskiller.xyz
      secretName: gaskiller-tls
