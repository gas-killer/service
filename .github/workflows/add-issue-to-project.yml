name: Add new issues to project backlog

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    name: Add issue to backlog
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to org project and set Backlog status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            const PROJECT_NUMBER = 1;
            const ORG = context.repo.owner;
            const ISSUE_NODE_ID = context.payload.issue.node_id;
            const STATUS_FIELD_NAME = "Status";
            const STATUS_VALUE = "Backlog";

            // 1. Get the project's node ID
            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { org: ORG, number: PROJECT_NUMBER });

            const project = projectQuery.organization.projectV2;
            const projectId = project.id;

            // 2. Add the issue to the project
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId
                  contentId: $contentId
                }) {
                  item { id }
                }
              }
            `, { projectId, contentId: ISSUE_NODE_ID });

            const itemId = addResult.addProjectV2ItemById.item.id;

            // 3. Find the "Status" field and the "Backlog" option
            const statusField = project.fields.nodes.find(
              f => f.name === STATUS_FIELD_NAME
            );
            if (!statusField) {
              core.setFailed(`Field "${STATUS_FIELD_NAME}" not found in project`);
              return;
            }
            const backlogOption = statusField.options.find(
              o => o.name === STATUS_VALUE
            );
            if (!backlogOption) {
              core.setFailed(`Status option "${STATUS_VALUE}" not found`);
              return;
            }

            // 4. Set the Status field to "Backlog"
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId,
              itemId,
              fieldId: statusField.id,
              optionId: backlogOption.id,
            });

            console.log(`✅ Issue #${context.payload.issue.number} added to project with status "${STATUS_VALUE}"`);
