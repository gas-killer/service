name: Helm Integration Test

on:
  push:
    branches:
      - main
      - dev
      - staging
      - bagelface/yield-dist-e2e
  pull_request:
    branches:
      - main
      - dev
      - staging
  workflow_dispatch:

jobs:
  helm-test:
    name: Test with Helm Charts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: gas-killer-test
          wait: 120s
          node_image: kindest/node:v1.27.3

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Build test scripts early to avoid delays after router starts
      # The router has a 180s internal timeout, so we need to minimize time between
      # router startup and triggering tasks
      - name: Build test scripts
        run: |
          cargo build --release -p avs-scripts --bin deploy_array_summation
          cargo build --release -p avs-scripts --bin trigger_gas_killer

      - name: Build Docker images
        run: |
          echo "Building router image..."
          docker build -f ./router/Dockerfile -t gas-killer-router:local .

          echo "Building node image..."
          docker build -f ./node/Dockerfile -t gas-killer-node:local .

      - name: Load images into kind cluster
        run: |
          echo "Loading router image into kind..."
          kind load docker-image gas-killer-router:local --name gas-killer-test

          echo "Loading node image into kind..."
          kind load docker-image gas-killer-node:local --name gas-killer-test

      - name: Verify cluster is ready
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Install Helm chart
        run: |
          # Set fork URL from secret or use public Sepolia
          if [ -n "${{ secrets.RPC_URL }}" ]; then
            FORK_URL="${{ secrets.RPC_URL }}"
          else
            FORK_URL="https://ethereum-sepolia-rpc.publicnode.com"
          fi

          # Use Anvil default keys for testing
          PRIVATE_KEY="0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
          FUNDED_KEY="0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

          echo "Installing Helm chart with fork URL: $FORK_URL"

          # Set L2 fork URL for Gnosis Anvil (LOCAL mode)
          if [ -n "${{ secrets.GNOSIS_RPC_URL }}" ]; then
            L2_FORK_URL="${{ secrets.GNOSIS_RPC_URL }}"
          else
            L2_FORK_URL="https://rpc.gnosischain.com"
          fi

          # Install without --wait to avoid circular dependency
          # (pods wait for setup job, setup job is post-install hook)
          # Use 20m timeout to allow setup + bridge + yield-distribution hooks to complete
          helm install gas-killer ./helm/gas-killer \
            --timeout 20m \
            --set global.environment=LOCAL \
            --set global.nodeCount=3 \
            --set secrets.forkUrl="$FORK_URL" \
            --set secrets.privateKey="$PRIVATE_KEY" \
            --set secrets.fundedKey="$FUNDED_KEY" \
            --set secrets.l2ForkUrl="$L2_FORK_URL" \
            --set node.image.repository=gas-killer-node \
            --set node.image.tag=local \
            --set node.image.pullPolicy=Never \
            --set router.image.repository=gas-killer-router \
            --set router.image.tag=local \
            --set router.image.pullPolicy=Never \
            --set sharedData.storageClass="" \
            --set gnosis.enabled=true \
            --set bridge.enabled=true \
            --set bridge.waitForBridge=true \
            --set yieldDistribution.enabled=true \
            --set eigenlayer.resources.requests.memory=512Mi \
            --set eigenlayer.resources.limits.memory=2Gi \
            --set gnosis.resources.requests.memory=512Mi \
            --set gnosis.resources.limits.memory=4Gi \
            --set ethereum.resources.limits.memory=4Gi

      - name: Check deployment status
        run: |
          echo "=== Helm Release Status ==="
          helm status gas-killer

          echo "=== All Pods ==="
          kubectl get pods -o wide

          echo "=== All Services ==="
          kubectl get services

      - name: Wait for setup job to complete
        run: |
          echo "Waiting for setup job to complete..."

          # Find the actual setup job name (includes chart name)
          SETUP_JOB=$(kubectl get jobs -o name | grep setup | head -1)

          if [ -z "$SETUP_JOB" ]; then
            echo "Setup job not found!"
            kubectl get jobs
            exit 1
          fi

          echo "Found setup job: $SETUP_JOB"
          kubectl wait --for=condition=complete "$SETUP_JOB" --timeout=500s

          echo "Setup job completed successfully"
          kubectl logs "$SETUP_JOB" --tail=30

      - name: Wait for bridge job to complete
        run: |
          echo "Waiting for bridge job to complete..."

          # Find the bridge job
          BRIDGE_JOB=$(kubectl get jobs -o name | grep bridge | head -1)

          if [ -n "$BRIDGE_JOB" ]; then
            echo "Found bridge job: $BRIDGE_JOB"
            kubectl wait --for=condition=complete "$BRIDGE_JOB" --timeout=600s || {
              echo "Bridge job failed or timed out"
              kubectl logs "$BRIDGE_JOB" --tail=100 || true
              exit 1
            }
            echo "Bridge job completed successfully"
            kubectl logs "$BRIDGE_JOB" --tail=30
          else
            echo "No bridge job found (bridge may be disabled)"
          fi

      - name: Wait for yield distribution job to complete
        run: |
          echo "Waiting for yield distribution job to complete..."

          # Find the yield distribution job
          YIELD_JOB=$(kubectl get jobs -o name | grep yield-distribution | head -1)

          if [ -n "$YIELD_JOB" ]; then
            echo "Found yield distribution job: $YIELD_JOB"

            # Wait for the job to complete (success or failure)
            TIMEOUT=600
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              # Check job status
              STATUS=$(kubectl get "$YIELD_JOB" -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
              FAILED=$(kubectl get "$YIELD_JOB" -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")

              if [ "$STATUS" = "True" ]; then
                echo "Yield distribution job completed successfully"
                # Get logs from the pod
                YIELD_POD=$(kubectl get pods -l job-name=$(echo "$YIELD_JOB" | sed 's|job/||') -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
                if [ -n "$YIELD_POD" ]; then
                  echo "=== Yield Distribution Pod Logs ==="
                  kubectl logs "$YIELD_POD" -c yield-distribution-test --tail=100 || true
                fi
                exit 0
              fi

              if [ "$FAILED" = "True" ]; then
                echo "Yield distribution job FAILED"
                # Get logs from the pod BEFORE it gets deleted
                YIELD_POD=$(kubectl get pods -l job-name=$(echo "$YIELD_JOB" | sed 's|job/||') -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
                if [ -n "$YIELD_POD" ]; then
                  echo "=== Yield Distribution Pod Logs (FAILED) ==="
                  echo "--- Init container: wait-for-bridge ---"
                  kubectl logs "$YIELD_POD" -c wait-for-bridge --tail=50 || true
                  echo "--- Init container: extract-addresses ---"
                  kubectl logs "$YIELD_POD" -c extract-addresses --tail=50 || true
                  echo "--- Main container: yield-distribution-test ---"
                  kubectl logs "$YIELD_POD" -c yield-distribution-test --tail=200 || true
                else
                  echo "Could not find yield distribution pod for logs"
                  kubectl get pods -o wide
                fi
                exit 1
              fi

              echo "Job still running... ($ELAPSED/$TIMEOUT seconds)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done

            echo "Timeout waiting for yield distribution job"
            # Try to get logs even on timeout
            YIELD_POD=$(kubectl get pods -l job-name=$(echo "$YIELD_JOB" | sed 's|job/||') -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$YIELD_POD" ]; then
              kubectl logs "$YIELD_POD" -c yield-distribution-test --tail=100 || true
            fi
            exit 1
          else
            echo "No yield distribution job found (yieldDistribution may be disabled)"
          fi

      - name: Wait for all pods to be ready
        run: |
          echo "Waiting for gnosis pod..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=gnosis --timeout=180s || echo "No gnosis pod found"

          echo "Waiting for ethereum pod..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=ethereum --timeout=180s

          echo "Waiting for node pods..."
          # Show pod status before waiting
          echo "=== Current pod status ==="
          kubectl get pods -o wide

          # Try waiting, but if it fails, show debug info
          if ! kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=node --timeout=300s; then
            echo "=== Node pods failed to become ready ==="
            kubectl get pods -o wide
            echo "=== Node-1 describe ==="
            kubectl describe pod -l gas-killer/node-index=1 || true
            echo "=== Node-1 logs ==="
            NODE1_POD=$(kubectl get pods -l gas-killer/node-index=1 -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$NODE1_POD" ]; then
              echo "Init container wait-for-setup:"
              kubectl logs $NODE1_POD -c wait-for-setup || true
              echo "Init container wait-for-ethereum:"
              kubectl logs $NODE1_POD -c wait-for-ethereum || true
              echo "Main container node:"
              kubectl logs $NODE1_POD -c node || true
            fi
            exit 1
          fi

          echo "Waiting for router pod..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=router --timeout=300s

          echo "All pods are ready!"

      - name: Setup port forwarding for testing
        run: |
          # Find actual service names (they include the chart name)
          ETHEREUM_SERVICE=$(kubectl get services -o name | grep ethereum | head -1 | sed 's|service/||')
          ROUTER_SERVICE=$(kubectl get services -o name | grep router | head -1 | sed 's|service/||')

          echo "Ethereum service: $ETHEREUM_SERVICE"
          echo "Router service: $ROUTER_SERVICE"

          # Port forward ethereum RPC
          kubectl port-forward service/$ETHEREUM_SERVICE 8545:8545 &

          # Port forward router ingress
          kubectl port-forward service/$ROUTER_SERVICE 8080:8080 &

          # Port forward gnosis RPC (for yield distribution verification)
          GNOSIS_SERVICE=$(kubectl get services -o name | grep gnosis | head -1 | sed 's|service/||')
          if [ -n "$GNOSIS_SERVICE" ]; then
            echo "Gnosis service: $GNOSIS_SERVICE"
            kubectl port-forward service/$GNOSIS_SERVICE 8546:8546 &
          fi

          # Wait for port forwards to be ready
          sleep 10

          echo "Port forwarding established"

      - name: Verify shared data was created
        run: |
          echo "Checking if setup job created the required files..."

          # Get the setup job pod name
          SETUP_POD=$(kubectl get pods -l app.kubernetes.io/component=setup -o jsonpath='{.items[0].metadata.name}')

          echo "Setup pod: $SETUP_POD"

          # Check PVC
          kubectl get pvc

          echo "Setup job logs:"
          kubectl logs $SETUP_POD || true

      - name: Get AVS deployment file
        run: |
          echo "Copying avs_deploy.json from router pod..."

          ROUTER_POD=$(kubectl get pods -l app.kubernetes.io/component=router -o jsonpath='{.items[0].metadata.name}')

          mkdir -p config/.nodes
          kubectl cp $ROUTER_POD:/app/.nodes/avs_deploy.json ./config/.nodes/avs_deploy.json

          if [ ! -f "./config/.nodes/avs_deploy.json" ]; then
            echo "AVS deployment file not found"
            exit 1
          fi

          echo "AVS deployment file contents:"
          cat ./config/.nodes/avs_deploy.json

      - name: Deploy ArraySummation contract
        run: |
          echo "Deploying ArraySummation contract..."

          export HTTP_RPC=http://localhost:8545
          export WS_RPC=ws://localhost:8545
          export AVS_DEPLOYMENT_PATH="./config/.nodes/avs_deploy.json"
          export PRIVATE_KEY="0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
          export ARRAY_SUMMATION_FACTORY_ADDRESS="0xF7ded769418Ec1Db4DA3bd2d47ab72ce2296A032"
          export ARRAY_SUMMATION_ARRAY_SIZE=100
          export ARRAY_SUMMATION_MAX_VALUE=1000
          export ARRAY_SUMMATION_SEED=42

          # Use pre-built binary for speed
          ./target/release/deploy_array_summation

          echo "ArraySummation deployment completed"

      - name: Trigger Gas Killer multiple times and verify execution
        run: |
          echo "Triggering Gas Killer tasks..."

          export HTTP_RPC=http://localhost:8545
          export WS_RPC=ws://localhost:8545
          export AVS_DEPLOYMENT_PATH="./config/.nodes/avs_deploy.json"
          export GAS_KILLER_TRIGGER_URL=http://localhost:8080/trigger
          export PRIVATE_KEY="0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

          # Get ArraySummation address from deployment file
          ARRAY_SUMMATION_ADDRESS=$(jq -r '.addresses.arraySummation' "$AVS_DEPLOYMENT_PATH")
          echo "ArraySummation address: $ARRAY_SUMMATION_ADDRESS"

          # Get initial stateTransitionCount
          INITIAL_COUNT=$(cast call "$ARRAY_SUMMATION_ADDRESS" "stateTransitionCount()(uint256)" --rpc-url http://localhost:8545 | tr -d '[:space:]')
          echo "Initial stateTransitionCount: $INITIAL_COUNT"

          NUM_TRIGGERS=3
          SUCCESSFUL=0

          for i in $(seq 1 $NUM_TRIGGERS); do
            echo "=== Triggering task $i of $NUM_TRIGGERS ==="
            # Use pre-built binary for speed
            if ./target/release/trigger_gas_killer; then
              echo "✅ Task $i completed successfully"
              SUCCESSFUL=$((SUCCESSFUL + 1))
            else
              echo "❌ Task $i failed"
              echo "=== Router logs ==="
              kubectl logs -l app.kubernetes.io/component=router --tail 100
              exit 1
            fi

            # Small delay between triggers
            if [ $i -lt $NUM_TRIGGERS ]; then
              echo "Waiting before next trigger..."
              sleep 2
            fi
          done

          # Verify stateTransitionCount increased
          FINAL_COUNT=$(cast call "$ARRAY_SUMMATION_ADDRESS" "stateTransitionCount()(uint256)" --rpc-url http://localhost:8545 | tr -d '[:space:]')
          echo "Final stateTransitionCount: $FINAL_COUNT"
          EXPECTED=$((INITIAL_COUNT + NUM_TRIGGERS))

          if [ "$FINAL_COUNT" -ge "$EXPECTED" ]; then
            echo "✅ stateTransitionCount increased correctly: $INITIAL_COUNT -> $FINAL_COUNT"
          else
            echo "❌ stateTransitionCount mismatch: expected at least $EXPECTED, got $FINAL_COUNT"
            exit 1
          fi

          # Check for SumCalculated events
          EVENT_TOPIC=$(cast keccak 'SumCalculated(uint256,uint256)')
          EVENT_COUNT=$(cast logs --from-block 0 --address "$ARRAY_SUMMATION_ADDRESS" --topic $EVENT_TOPIC --rpc-url http://localhost:8545 2>/dev/null | grep -c "blockNumber" || echo "0")
          echo "Found $EVENT_COUNT SumCalculated events"

          if [ "$EVENT_COUNT" -ge "$NUM_TRIGGERS" ]; then
            echo "✅ Expected number of events found: $EVENT_COUNT >= $NUM_TRIGGERS"
          else
            echo "⚠️ Fewer events than expected: $EVENT_COUNT < $NUM_TRIGGERS"
          fi

          echo "✅ All $SUCCESSFUL triggers completed successfully!"

      - name: Trigger Yield Distribution via router
        run: |
          echo "=== Triggering Yield Distribution through router ==="

          YIELD_DISTRIBUTOR="0xeE95A62b749d8a2520E0128D9b3aCa241269024b"
          L2_RPC="http://localhost:8546"
          ROUTER_URL="http://localhost:8080"

          # Capture router state before trigger
          echo "=== Router pod status before trigger ==="
          kubectl get pods -l app.kubernetes.io/component=router -o wide
          ROUTER_POD=$(kubectl get pods -l app.kubernetes.io/component=router -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          echo "Router pod: $ROUTER_POD"
          echo "Restart count: $(kubectl get pod $ROUTER_POD -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo unknown)"
          echo "=== Router logs before trigger (last 50 lines) ==="
          kubectl logs $ROUTER_POD --tail=50 || true

          # Debug: Verify L2 mode is active on the router
          echo ""
          echo "=== L2 Mode Verification ==="
          echo "Router env vars (L2-related):"
          kubectl exec $ROUTER_POD -c router -- env 2>/dev/null | grep -E "(GNOSIS|L2_AVS|AVS_DEPLOYMENT)" || echo "WARNING: Could not read env vars"
          echo ""
          echo "L2 AVS deployment file on PVC:"
          kubectl exec $ROUTER_POD -c router -- cat /app/.nodes/l2_avs_deploy.json 2>/dev/null || echo "WARNING: l2_avs_deploy.json NOT FOUND on router pod"
          echo ""
          echo "Router startup mode (L2 vs L1):"
          kubectl logs $ROUTER_POD 2>/dev/null | grep -E "(L2 mode|L1 mode|GNOSIS_HTTP_RPC not set)" || echo "WARNING: No L2/L1 mode log found in router output"
          echo ""

          # Get current state
          INITIAL_COUNT=$(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "stateTransitionCount()(uint256)" 2>/dev/null | grep -oE '^[0-9]+' | head -1 || echo "0")
          BLOCK=$(cast block-number --rpc-url "$L2_RPC" | tr -d '[:space:]')
          echo "Initial stateTransitionCount: $INITIAL_COUNT"
          echo "Gnosis block: $BLOCK"

          # Verify distribution is ready
          RESOLVER=$(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "resolveYieldDistribution()(bool,bytes)" 2>&1)
          echo "resolveYieldDistribution: $RESOLVER"

          if ! echo "$RESOLVER" | grep -q "true"; then
            echo "ERROR: resolveYieldDistribution did not return true - yield is not ready for distribution"
            echo "This likely means the yield-distribution helm hook did not properly set up timing."
            echo "Checking contract state..."
            echo "cycleLength: $(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "cycleLength()(uint256)" 2>/dev/null || echo N/A)"
            echo "lastClaimedBlockNumber: $(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "lastClaimedBlockNumber()(uint256)" 2>/dev/null || echo N/A)"
            echo "current block: $(cast block-number --rpc-url "$L2_RPC" 2>/dev/null || echo N/A)"
            echo "blsSignatureChecker: $(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "blsSignatureChecker()(address)" 2>/dev/null || echo N/A)"
            echo "avsAddress: $(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "avsAddress()(address)" 2>/dev/null || echo N/A)"
            exit 1
          fi
          echo "Distribution is ready!"

          # Build distributeYieldGK() calldata
          CALL_DATA=$(cast calldata "distributeYieldGK()")
          echo "Calldata: $CALL_DATA"

          # Convert calldata hex to JSON byte array
          CALL_DATA_HEX="${CALL_DATA#0x}"
          BYTES_ARRAY="["
          for ((i=0; i<${#CALL_DATA_HEX}; i+=2)); do
            [ $i -gt 0 ] && BYTES_ARRAY+=","
            BYTES_ARRAY+="$((16#${CALL_DATA_HEX:$i:2}))"
          done
          BYTES_ARRAY+="]"

          # Build and send trigger payload
          PAYLOAD="{\"body\":{\"target_address\":\"$YIELD_DISTRIBUTOR\",\"call_data\":$BYTES_ARRAY,\"transition_index\":$INITIAL_COUNT,\"from_address\":\"0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266\",\"value\":\"0\",\"block_height\":$BLOCK}}"
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$ROUTER_URL/trigger")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Router response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Router rejected the trigger request"
            echo "=== Router logs ==="
            kubectl logs -l app.kubernetes.io/component=router --tail 50
            exit 1
          fi

          # Capture logs periodically during the wait to catch crashes
          echo "Waiting 120s for BLS aggregation and on-chain execution..."
          for i in 30 60 90 120; do
            sleep 30
            echo ""
            echo "=== ${i}s checkpoint ==="
            RESTART_COUNT=$(kubectl get pod $ROUTER_POD -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo unknown)
            PHASE=$(kubectl get pod $ROUTER_POD -o jsonpath='{.status.phase}' 2>/dev/null || echo unknown)
            echo "Router pod phase: $PHASE, restart count: $RESTART_COUNT"
            if [ "$RESTART_COUNT" != "0" ] && [ "$RESTART_COUNT" != "unknown" ]; then
              echo "=== ROUTER RESTARTED! Previous container logs (last 200 lines): ==="
              kubectl logs $ROUTER_POD --previous --tail=200 2>/dev/null || echo "No previous logs available"
              echo "=== Current container logs (after restart): ==="
              kubectl logs $ROUTER_POD --tail=100 2>/dev/null || true
            fi
          done

          # Final state
          echo ""
          echo "=== Final router state ==="
          kubectl get pods -l app.kubernetes.io/component=router -o wide
          FINAL_RESTART=$(kubectl get pod $ROUTER_POD -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo unknown)
          echo "Final restart count: $FINAL_RESTART"

          # Verify stateTransitionCount increased
          FINAL_COUNT=$(cast call --rpc-url "$L2_RPC" "$YIELD_DISTRIBUTOR" "stateTransitionCount()(uint256)" 2>/dev/null | grep -oE '^[0-9]+' | head -1 || echo "0")
          echo "Final stateTransitionCount: $FINAL_COUNT"

          if [ "$FINAL_COUNT" -gt "$INITIAL_COUNT" ] 2>/dev/null; then
            echo "=== YIELD DISTRIBUTION TRIGGER PASSED ==="
            echo "stateTransitionCount increased from $INITIAL_COUNT to $FINAL_COUNT"
          else
            echo "=== YIELD DISTRIBUTION TRIGGER FAILED ==="
            echo "stateTransitionCount did not increase (initial: $INITIAL_COUNT, final: $FINAL_COUNT)"
            echo ""
            echo "=== Router logs (last 100) ==="
            kubectl logs $ROUTER_POD --tail=100 2>/dev/null || true
            echo ""
            echo "=== Previous container logs (if restarted, last 200) ==="
            kubectl logs $ROUTER_POD --previous --tail=200 2>/dev/null || echo "No previous container logs"
            echo ""
            echo "=== Node-1 logs (last 50) ==="
            kubectl logs -l gas-killer/node-index=1 -c node --tail 50 || true
            echo ""
            echo "=== Node-2 logs (last 50) ==="
            kubectl logs -l gas-killer/node-index=2 -c node --tail 50 || true
            echo ""
            echo "=== Node-3 logs (last 50) ==="
            kubectl logs -l gas-killer/node-index=3 -c node --tail 50 || true
            exit 1
          fi

      - name: Show router logs
        run: |
          echo "=== Router logs ==="
          kubectl logs -l app.kubernetes.io/component=router --tail 50

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== All Pods Status ==="
          kubectl get pods -o wide

          echo "=== Events (last 30) ==="
          kubectl get events --sort-by=.metadata.creationTimestamp | tail -30

          echo "=== Yield Distribution Job Logs ==="
          kubectl logs -l app.kubernetes.io/component=yield-distribution --tail 100 || true

          echo "=== Router Logs (current, last 200) ==="
          ROUTER_POD=$(kubectl get pods -l app.kubernetes.io/component=router -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$ROUTER_POD" ]; then
            echo "Restart count: $(kubectl get pod $ROUTER_POD -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo unknown)"
            kubectl logs $ROUTER_POD --tail=200 || true
            echo ""
            echo "=== Router Logs (previous container, if crashed/restarted) ==="
            kubectl logs $ROUTER_POD --previous --tail=200 2>/dev/null || echo "No previous container logs available"
          fi

          echo "=== Node-1 Logs (last 100) ==="
          kubectl logs -l gas-killer/node-index=1 -c node --tail 100 || true

          echo "=== Node-2 Logs (last 100) ==="
          kubectl logs -l gas-killer/node-index=2 -c node --tail 100 || true

          echo "=== Node-3 Logs (last 100) ==="
          kubectl logs -l gas-killer/node-index=3 -c node --tail 100 || true

      - name: Cleanup
        if: always()
        run: |
          # Kill port forwarding
          pkill -f "port-forward" || true

          # Uninstall helm release
          helm uninstall gas-killer || true

          # Delete the kind cluster
          kind delete cluster --name gas-killer-test || true
