name: E2E Test

on:
  push:
    branches:
      - main
      - dev
      - staging
      - fix/set-block-height-in-e2e
  pull_request:
    branches:
      - main
      - dev
      - staging
      - fix/set-block-height-in-e2e
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          cp example.env .env
          if grep -q '^FORK_URL=' .env; then
            sed -i "s|^FORK_URL=.*|FORK_URL=${{ secrets.RPC_URL }}|" .env
          else
            echo "FORK_URL=${{ secrets.RPC_URL }}" >> .env
          fi

      - name: Run test
        run: bash ./scripts/run_e2e_test.sh 2>&1 | tee e2e-test-output.log; exit ${PIPESTATUS[0]}

      - name: Show router logs
        if: always()
        run: |
          echo "=== Router Logs ==="
          docker compose logs router || true

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-output
          path: e2e-test-output.log
          retention-days: 1
