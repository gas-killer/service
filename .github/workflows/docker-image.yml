name: Docker CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
  release:
    types: [created]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG_NAME: gas-killer

jobs:
  build-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG_NAME }}/service"
          SHA_TAG="${IMAGE}:node-${{ github.sha }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.ref_name }}"
            MINOR="$(echo "$VERSION" | sed 's/\.[^.]*$//')"
            MAJOR="$(echo "$VERSION" | sed 's/\.[^.]*$//' | sed 's/\.[^.]*$//')"
            echo "tags=${SHA_TAG},${IMAGE}:node-${VERSION},${IMAGE}:node-${MINOR},${IMAGE}:node-${MAJOR},${IMAGE}:node-latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=${SHA_TAG},${IMAGE}:node-latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${SHA_TAG},${IMAGE}:node-${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: node/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=node
          cache-to: type=gha,mode=max,scope=node
          build-args: |
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            GIT_TERMINAL_PROMPT=0
            GIT_ASKPASS=/bin/echo
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GH_PAT }}

  build-router:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG_NAME }}/service"
          SHA_TAG="${IMAGE}:router-${{ github.sha }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.ref_name }}"
            MINOR="$(echo "$VERSION" | sed 's/\.[^.]*$//')"
            MAJOR="$(echo "$VERSION" | sed 's/\.[^.]*$//' | sed 's/\.[^.]*$//')"
            echo "tags=${SHA_TAG},${IMAGE}:router-${VERSION},${IMAGE}:router-${MINOR},${IMAGE}:router-${MAJOR},${IMAGE}:router-latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=${SHA_TAG},${IMAGE}:router-latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${SHA_TAG},${IMAGE}:router-${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: router/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=router
          cache-to: type=gha,mode=max,scope=router
          build-args: |
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            GIT_TERMINAL_PROMPT=0
            GIT_ASKPASS=/bin/echo
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GH_PAT }}
