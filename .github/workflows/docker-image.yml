name: Docker CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: repo
        run: echo "name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}:amd64-${{ github.sha }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          build-args: |
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            GIT_TERMINAL_PROMPT=0
            GIT_ASKPASS=/bin/echo
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GH_PAT }}

      - name: Tag and push version tags
        run: |
          NAME="${{ env.REGISTRY }}/${{ github.repository }}" && NAME="${NAME,,}"
          TAG="${{ github.event_name == 'release' && github.ref_name || (github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'dev') }}"

          docker pull "${NAME}:amd64-${{ github.sha }}"
          docker tag "${NAME}:amd64-${{ github.sha }}" "${NAME}:${TAG}"
          docker push "${NAME}:${TAG}"

          if [ "${{ github.event_name }}" = "release" ]; then
            docker tag "${NAME}:amd64-${{ github.sha }}" "${NAME}:latest"
            docker push "${NAME}:latest"
          fi