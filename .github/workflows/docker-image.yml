name: Docker CI/CD

on:
  push:
    branches:
      - main
      - dev
      - staging
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG_NAME: breadchaincoop

jobs:
  build-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: node/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG_NAME }}/gas-killer-node:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.ORG_NAME }}/gas-killer-node:${{ github.sha }}
          cache-from: type=gha,scope=node
          cache-to: type=gha,mode=max,scope=node
          build-args: |
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            GIT_TERMINAL_PROMPT=0
            GIT_ASKPASS=/bin/echo
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GH_PAT }}

  build-router:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: router/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG_NAME }}/gas-killer-router:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.ORG_NAME }}/gas-killer-router:${{ github.sha }}
          cache-from: type=gha,scope=router
          cache-to: type=gha,mode=max,scope=router
          build-args: |
            CARGO_NET_GIT_FETCH_WITH_CLI=true
            GIT_TERMINAL_PROMPT=0
            GIT_ASKPASS=/bin/echo
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GH_PAT }}
