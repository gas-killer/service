name: Gas Killer E2E Test

on:
  push:
    branches: [dev, main, debug/array-summation-integration-test]
  pull_request:
    branches: [dev, main, debug/array-summation-integration-test]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            vendor/gas-killer-analyzer/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          cat > .env << EOF
          ENVIRONMENT=LOCAL
          HTTP_RPC=http://localhost:8545
          WS_RPC=ws://localhost:8545
          RPC_URL=http://ethereum:8545
          FORK_URL=${{ secrets.RPC_URL }}
          PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
          FUNDED_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
          TEST_ACCOUNTS=3
          AVS_DEPLOYMENT_PATH="config/.nodes/avs_deploy.json"
          ARRAY_SUMMATION_FACTORY_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
          ARRAY_SUMMATION_ARRAY_SIZE=100
          ARRAY_SUMMATION_MAX_VALUE=1000
          ARRAY_SUMMATION_SEED=42
          INGRESS=true
          INGRESS_ADDRESS=0.0.0.0:8080
          INGRESS_TIMEOUT_MS=120000
          GAS_KILLER_ROUTER_URL=http://localhost:8080
          SIGNER_ENDPOINT=http://signer:50051
          CERBERUS_GRPC_PORT=50051
          CERBERUS_METRICS_PORT=9081
          EOF

      - name: Run E2E test
        run: bash ./scripts/router_e2e_local.sh
