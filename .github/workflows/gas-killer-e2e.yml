name: Gas Killer E2E Test

on:
  push:
    branches: [dev, main, debug/array-summation-integration-test]
  pull_request:
    branches: [dev, main, debug/array-summation-integration-test]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            vendor/gas-killer-analyzer/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          cat > .env << EOF
          ENVIRONMENT=LOCAL
          HTTP_RPC=http://localhost:8545
          WS_RPC=ws://localhost:8545
          RPC_URL=http://ethereum:8545
          FORK_URL=${{ secrets.RPC_URL }}
          PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
          FUNDED_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
          TEST_ACCOUNTS=3
          AVS_DEPLOYMENT_PATH="config/.nodes/avs_deploy.json"
          DELEGATION_MANAGER_ADDRESS=0xA44151489861Fe9e3055d95adC98FbD462B948e7
          STRATEGY_MANAGER_ADDRESS=0xdfB5f6CE42aAA7830E94ECFCcAd411beF4d4D5b6
          LST_CONTRACT_ADDRESS=0x3F1c547b21f65e10480dE3ad8E19fAAC46C95034
          LST_STRATEGY_ADDRESS=0x7D704507b76571a51d9caE8AdDAbBFd0ba0e63d3
          BLS_SIGNATURE_CHECKER_ADDRESS=0xca249215e082e17c12bb3c4881839a3f883e5c6b
          OPERATOR_STATE_RETRIEVER_ADDRESS=0xB4baAfee917fb4449f5ec64804217bccE9f46C67
          ALLOCATION_MANAGER_ADDRESS=0x78469728304326CBc65f8f95FA756B0B73164462
          ARRAY_SUMMATION_FACTORY_ADDRESS=0xb1D69826B93F2B360db94E3302dB2E6ce0D4e252
          ARRAY_SUMMATION_ARRAY_SIZE=100
          ARRAY_SUMMATION_MAX_VALUE=1000
          ARRAY_SUMMATION_SEED=42
          INGRESS=true
          INGRESS_ADDRESS=0.0.0.0:8080
          INGRESS_TIMEOUT_MS=120000
          GAS_KILLER_ROUTER_URL=http://localhost:8080
          SIGNER_ENDPOINT=http://signer:50051
          CERBERUS_GRPC_PORT=50051
          CERBERUS_METRICS_PORT=9081
          RUST_LOG=info
          EOF

      - name: Run E2E test
        run: bash ./scripts/router_e2e_local.sh 2>&1 | tee e2e-test-output.log

      - name: Show router logs
        if: always()
        run: |
          echo "=== Router Logs ==="
          docker compose logs router || true

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-output
          path: e2e-test-output.log
          retention-days: 1
