name: Rust CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Format, Clippy, Check
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      GIT_ASKPASS: /bin/echo
      GIT_TERMINAL_PROMPT: 0
    strategy:
      fail-fast: false
      matrix:
        crate_dir: ["."]
    defaults:
      run:
        working-directory: ${{ matrix.crate_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git to use PAT for GitHub
        run: |
          git config --global url."https://${GH_PAT}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${GH_PAT}:x-oauth-basic@github.com/".insteadOf "ssh://git@github.com/"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          # Cache workspace to speed up runs
          workspaces: |
            .

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo check (all targets)
        run: cargo check --all-targets --all-features
