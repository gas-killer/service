name: Rust CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Format, Clippy, Check
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      GIT_ASKPASS: /bin/echo
      GIT_TERMINAL_PROMPT: 0
    strategy:
      fail-fast: false
      matrix:
        crate_dir: ["."]
    defaults:
      run:
        working-directory: ${{ matrix.crate_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Configure git authentication
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com" > ~/.git-credentials

          # Configure git URL rewrites
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

          # Configure Cargo to use git CLI
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@v2
        with:
          # Cache workspace to speed up runs
          workspaces: |
            .

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo check (all targets)
        run: cargo check --all-targets --all-features

      - name: cargo test
        run: cargo test --all-targets --all-features
        env:
          HTTP_RPC: ${{ secrets.HTTP_RPC }}
